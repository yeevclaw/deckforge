<?xml version="1.0" encoding="UTF-8"?>
<!--
  flow-anim demo in the default corporate_fresh style — transit_pipeline
  composition (geometry from examples/sample-deck/page_03.svg).
  The 12px gradient transit line + integrated arrowhead stay STATIC; the
  animated element is a thin white pulse overlay (class="flow-anim") running
  along the line, passing under the station rings. This is the correct way to
  animate a thick rail — a marker-end on a 12px stroke can never be
  proportionate, and dashing the rail itself reads as beads, not flow.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="120" y1="0" x2="1140" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CDEBD9"/>
      <stop offset="100%" stop-color="#7BCBA4"/>
    </linearGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="52%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washLav" cx="94%" cy="6%" r="44%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <filter id="freshShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="102" font-size="34" font-weight="700" fill="#383838">資料在管線中持續流動，每一站都有明確產出</text>

  <!-- wide panel -->
  <rect x="48" y="160" width="1184" height="480" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>

  <!-- transit line with integrated arrowhead (static) -->
  <line x1="140" y1="360" x2="1090" y2="360" stroke="url(#lineGrad)" stroke-width="12" stroke-linecap="round"/>
  <path d="M 1084 338 L 1144 360 L 1084 382 Z" fill="#7BCBA4"/>

  <!-- animated pulse overlay: thin white dashes flowing along the rail,
       drawn after the rail and before the station rings -->
  <line class="flow-anim" x1="140" y1="360" x2="1078" y2="360"
        stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="10 18" stroke-opacity="0.9"/>

  <!-- station 1: collect -->
  <g>
    <g transform="translate(143 240)">
      <g transform="scale(2.2)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" fill="#D8E4FB"/>
        <circle cx="9" cy="7" r="4" fill="#D8E4FB"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" fill="none"/>
      </g>
    </g>
    <circle cx="170" cy="360" r="16" fill="#FFFFFF" stroke="#5BBE8C" stroke-width="5"/>
    <text x="170" y="428" font-size="20" font-weight="700" fill="#383838" text-anchor="middle">訊號收集</text>
    <text x="170" y="460" font-size="16" fill="#6B7178" text-anchor="middle">多源持續捕捉</text>
    <text x="170" y="498" font-size="16" font-weight="700" fill="#E8872E" text-anchor="middle">原始資料</text>
  </g>

  <!-- station 2: clean -->
  <g>
    <g transform="translate(373 240)">
      <g transform="scale(2.2)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" fill="#D8E4FB"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" fill="#FFFFFF"/>
      </g>
    </g>
    <circle cx="400" cy="360" r="16" fill="#FFFFFF" stroke="#5BBE8C" stroke-width="5"/>
    <text x="400" y="428" font-size="20" font-weight="700" fill="#383838" text-anchor="middle">清洗整理</text>
    <text x="400" y="460" font-size="16" fill="#6B7178" text-anchor="middle">去噪統一格式</text>
    <text x="400" y="498" font-size="16" font-weight="700" fill="#E8872E" text-anchor="middle">標準資料</text>
  </g>

  <!-- station 3: aggregate -->
  <g>
    <g transform="translate(603 240)">
      <g transform="scale(2.2)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="#D8E4FB"/>
        <polyline points="14 2 14 8 20 8" fill="#FFFFFF"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </g>
    </g>
    <circle cx="630" cy="360" r="16" fill="#FFFFFF" stroke="#5BBE8C" stroke-width="5"/>
    <text x="630" y="428" font-size="20" font-weight="700" fill="#383838" text-anchor="middle">聚合分析</text>
    <text x="630" y="460" font-size="16" fill="#6B7178" text-anchor="middle">形成可檢驗假設</text>
    <text x="630" y="498" font-size="16" font-weight="700" fill="#E8872E" text-anchor="middle">候選假設</text>
  </g>

  <!-- station 4: validate -->
  <g>
    <g transform="translate(833 240)">
      <g transform="scale(2.2)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" fill="#D8E4FB"/>
        <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" fill="#FFFFFF"/>
      </g>
    </g>
    <circle cx="860" cy="360" r="16" fill="#FFFFFF" stroke="#5BBE8C" stroke-width="5"/>
    <text x="860" y="428" font-size="20" font-weight="700" fill="#383838" text-anchor="middle">假設驗證</text>
    <text x="860" y="460" font-size="16" fill="#6B7178" text-anchor="middle">數據檢驗可信度</text>
    <text x="860" y="498" font-size="16" font-weight="700" fill="#E8872E" text-anchor="middle">驗證結論</text>
  </g>

  <!-- station 5: deliver -->
  <g>
    <g transform="translate(1063 240)">
      <g transform="scale(2.2)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none"/>
        <polyline points="7 10 12 15 17 10" fill="none"/><line x1="12" y1="15" x2="12" y2="3"/>
      </g>
    </g>
    <circle cx="1090" cy="360" r="16" fill="#FFFFFF" stroke="#5BBE8C" stroke-width="5"/>
    <text x="1090" y="428" font-size="20" font-weight="700" fill="#383838" text-anchor="middle">決策交付</text>
    <text x="1090" y="460" font-size="16" fill="#6B7178" text-anchor="middle">可執行決策建議</text>
    <text x="1090" y="498" font-size="16" font-weight="700" fill="#E8872E" text-anchor="middle">行動方案</text>
  </g>

  <!-- footnote -->
  <text x="640" y="586" font-size="16" fill="#4A5158" text-anchor="middle">流動的虛線標記資料持續通過管線——動畫只用在「持續流動」的語意上，離散步驟維持靜態</text>
</svg>
