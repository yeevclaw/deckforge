<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>AcmeCloud — TOC</title>
<style>
  :root {
    --primary: #1E2761;
    --secondary: #CADCFC;
    --accent: #6E8FE6;
    --bg: #F7F9FC;
    --text: #1A1A2E;
    --text-muted: #5A5A72;
    --slide-w: 1280px; --slide-h: 720px; --pad: 80px;
    --font-header: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, -apple-system, sans-serif;
    --font-body:   "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { width: var(--slide-w); height: var(--slide-h); background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
  .toc { width: 100%; height: 100%; padding: var(--pad); display: grid; grid-template-columns: 380px 1fr; gap: 60px; align-items: center; }
  .toc-left h1 {
    font-family: var(--font-header);
    font-size: 72px;
    font-weight: 900;
    color: var(--primary);
    margin: 0 0 14px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .toc-left .subtitle { font-size: 14px; color: var(--text-muted); letter-spacing: 0.22em; margin: 0; text-transform: uppercase; font-weight: 600; }
  .toc-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px 28px;
  }
  .toc-item {
    display: flex;
    gap: 22px;
    padding: 24px 26px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    align-items: center;
  }
  .toc-num {
    font-family: var(--font-header);
    font-size: 36px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    min-width: 50px;
  }
  .toc-text {
    font-size: 18px;
    font-weight: 600;
    color: var(--primary);
    line-height: 1.35;
  }
</style>
</head>
<body>
  <div class="toc">
    <div class="toc-left">
      <h1>目錄</h1>
      <p class="subtitle">CONTENTS</p>
    </div>
    <div class="toc-list">
      <div class="toc-item"><div class="toc-num">01</div><div class="toc-text">市場機會</div></div>
      <div class="toc-item"><div class="toc-num">02</div><div class="toc-text">我們的解法</div></div>
      <div class="toc-item"><div class="toc-num">03</div><div class="toc-text">牽引力與成績</div></div>
      <div class="toc-item"><div class="toc-num">04</div><div class="toc-text">成長與融資計畫</div></div>
    </div>
  </div>
</body>
</html>
