<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>AcmeCloud — Market</title>
<style>
  :root {
    --primary: #1E2761;
    --secondary: #CADCFC;
    --accent: #6E8FE6;
    --bg: #F7F9FC;
    --text: #1A1A2E;
    --text-muted: #5A5A72;
    --slide-w: 1280px; --slide-h: 720px; --pad: 48px; --gap: 20px; --card-radius: 16px;
    --font-header: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
    --font-body:   "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { width: var(--slide-w); height: var(--slide-h); background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
  .slide { width: 100%; height: 100%; padding: var(--pad); display: flex; flex-direction: column; }
  .slide-title { font-family: var(--font-header); font-size: 40px; font-weight: 900; color: var(--primary); margin: 0; line-height: 1.18; letter-spacing: -0.01em; }
  .slide-subtitle { font-size: 17px; color: var(--text-muted); margin: 8px 0 28px; line-height: 1.45; }
  .bento { flex: 1; display: grid; gap: var(--gap); grid-template-columns: 2fr 1fr; min-height: 0; }
  .card {
    background: #fff;
    border-radius: var(--card-radius);
    padding: 30px 32px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0; min-height: 0; overflow: hidden;
  }
  .icon-wrap {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: color-mix(in oklab, var(--secondary) 75%, #fff);
    display: grid; place-items: center;
    flex: 0 0 auto;
  }
  .icon-wrap svg { width: 24px; height: 24px; stroke: var(--primary); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .card.large h3 { font-size: 26px; }
  .card.large p { font-size: 16px; }
  .card h3 { font-family: var(--font-header); font-size: 22px; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.3; }
  .card p { font-size: 15px; color: var(--text); margin: 0; line-height: 1.65; }

  .market-vis {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 8px;
    padding: 18px 0 4px;
  }
  .donut {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: conic-gradient(var(--primary) 0% 69%, color-mix(in oklab, var(--secondary) 60%, #fff) 69% 100%);
    display: grid; place-items: center;
    flex: 0 0 auto;
    position: relative;
  }
  .donut::after {
    content: '';
    position: absolute;
    inset: 16px;
    border-radius: 50%;
    background: #fff;
  }
  .donut .big-pct {
    font-family: var(--font-header);
    font-size: 36px;
    font-weight: 900;
    color: var(--primary);
    position: relative; z-index: 1;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .donut .big-pct .small { font-size: 16px; opacity: 0.55; margin-left: 2px; }
  .market-text { color: var(--text-muted); font-size: 14px; line-height: 1.55; }
  .market-text strong { color: var(--primary); font-weight: 700; }

  .blockers { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .blockers li {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }
  .blockers li::before {
    content: '';
    flex: 0 0 auto;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: color-mix(in oklab, var(--accent) 22%, #fff);
    color: var(--primary);
    display: grid; place-items: center;
    font-weight: 800;
    font-size: 11px;
    counter-increment: blocker;
  }
  .blockers { counter-reset: blocker; }
  .blockers li:nth-child(1)::before { content: '1'; }
  .blockers li:nth-child(2)::before { content: '2'; }
  .blockers li:nth-child(3)::before { content: '3'; }
</style>
</head>
<body>
  <div class="slide">
    <h1 class="slide-title">70% 中型 SaaS 還沒導入生成式 AI</h1>
    <p class="slide-subtitle">AI 雖然紅,但真正落地的是少數 — 這是一個被低估的 $50B 機會</p>
    <main class="bento">
      <article class="card large">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        </div>
        <h3>落差大於想像</h3>
        <p>Gartner 2026 Q1 調查:年營收 $5M–$50M 的 SaaS 公司中,僅 31% 上線任一生成式 AI 功能。其中 82% 表示「想做但卡住」。</p>
        <div class="market-vis">
          <div class="donut">
            <span class="big-pct">69<span class="small">%</span></span>
          </div>
          <div class="market-text">
            <strong>69% 仍未導入 AI</strong><br>
            僅 31% 有任一 AI 功能上線,<br>
            其中真正成熟落地者不到 8%。
          </div>
        </div>
      </article>
      <article class="card">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <h3>三大卡點</h3>
        <ul class="blockers">
          <li>缺工程量能 — AI 團隊難招</li>
          <li>資料散落各模組無法整合</li>
          <li>法遵與隱私無專人負責</li>
        </ul>
      </article>
    </main>
  </div>
</body>
</html>
