<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>AcmeCloud — End</title>
<style>
  :root {
    --primary: #1E2761;
    --secondary: #CADCFC;
    --accent: #6E8FE6;
    --slide-w: 1280px; --slide-h: 720px; --pad: 80px;
    --font-header: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
    --font-body:   "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: var(--slide-w); height: var(--slide-h);
    background:
      radial-gradient(circle at 80% 30%, color-mix(in oklab, var(--accent) 26%, transparent), transparent 50%),
      radial-gradient(circle at 20% 80%, color-mix(in oklab, var(--secondary) 14%, transparent), transparent 50%),
      var(--primary);
    color: #fff;
    font-family: var(--font-body);
    overflow: hidden;
    position: relative;
  }
  .accent-shape {
    position: absolute;
    right: -150px; bottom: -150px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: color-mix(in oklab, var(--accent) 18%, transparent);
    filter: blur(48px);
  }
  .end {
    width: 100%; height: 100%;
    padding: var(--pad);
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
    z-index: 1;
  }
  .eyebrow {
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--secondary);
    margin: 0 0 32px;
    font-weight: 600;
  }
  h1 {
    font-family: var(--font-header);
    font-size: 76px;
    font-weight: 900;
    line-height: 1.08;
    margin: 0;
    max-width: 1040px;
    letter-spacing: -0.02em;
  }
  h1 .accent-word { color: var(--accent); }
  .contact {
    display: flex;
    gap: 60px;
    margin-top: 60px;
    flex-wrap: wrap;
  }
  .contact-item .label {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .contact-item .value {
    font-family: var(--font-header);
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .footer {
    position: absolute;
    bottom: var(--pad);
    left: var(--pad);
    right: var(--pad);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
  }
  .logo {
    font-family: var(--font-header);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.18em;
    color: #fff;
  }
  .logo::before {
    content: '';
    display: inline-block;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 10px;
    transform: translateY(-1px);
    vertical-align: middle;
  }
</style>
</head>
<body>
  <div class="accent-shape"></div>
  <div class="end">
    <p class="eyebrow">THANK YOU</p>
    <h1>與我們一起重寫 <span class="accent-word">SaaS 的下一章</span></h1>
    <div class="contact">
      <div class="contact-item">
        <div class="label">Email</div>
        <div class="value">jordan@acmecloud.ai</div>
      </div>
      <div class="contact-item">
        <div class="label">Deck</div>
        <div class="value">acmecloud.ai/series-b</div>
      </div>
      <div class="contact-item">
        <div class="label">Phone</div>
        <div class="value">+886 2 2345 6789</div>
      </div>
    </div>
    <div class="footer">
      <span class="logo">ACMECLOUD</span>
      <span>2026 Q2 · CONFIDENTIAL</span>
    </div>
  </div>
</body>
</html>
