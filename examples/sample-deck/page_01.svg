<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="heroGlow" cx="20%" cy="78%" r="60%">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topRight" cx="92%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="#000000"/>
  <rect width="1280" height="720" fill="url(#heroGlow)"/>
  <rect width="1280" height="720" fill="url(#topRight)"/>

  <!-- Eyebrow -->
  <text x="80" y="220" font-size="14" font-weight="500" letter-spacing="6"
        fill="#FF6900" opacity="0.85">A CLAUDE SKILL</text>

  <!-- CN main title -->
  <text x="80" y="370" font-size="128" font-weight="900" fill="#FFFFFF"
        letter-spacing="-3">DeckForge</text>

  <!-- EN subtitle -->
  <text x="80" y="416" font-size="22" font-weight="500" fill="#A0A0A0">
    The Claude skill for editable, designed presentations.
  </text>

  <!-- Three quiet value props -->
  <g font-size="13" letter-spacing="2">
    <text x="80" y="560" fill="#FF6900">01</text>
    <text x="80" y="586" font-size="15" fill="#FFFFFF">5-Phase Workflow</text>
    <text x="80" y="608" font-size="12" fill="#666666">研究 → 大綱 → 策劃 → 設計 → 產出</text>

    <text x="430" y="560" fill="#FF6900">02</text>
    <text x="430" y="586" font-size="15" fill="#FFFFFF">SVG-Native</text>
    <text x="430" y="608" font-size="12" fill="#666666">向量輸出,不是圖片</text>

    <text x="780" y="560" fill="#FF6900">03</text>
    <text x="780" y="586" font-size="15" fill="#FFFFFF">Editable in PowerPoint</text>
    <text x="780" y="608" font-size="12" fill="#666666">Convert to Shape → 完整可編輯</text>
  </g>

  <!-- Footer -->
  <text x="80" y="668" font-size="12" fill="#666666">github.com/yeevclaw/deckforge</text>
  <text x="1200" y="668" font-size="12" fill="#666666" text-anchor="end">01 / 03</text>
</svg>
