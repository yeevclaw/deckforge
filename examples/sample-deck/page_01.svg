<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="bgA" cx="22%" cy="28%" r="58%">
      <stop offset="0%" stop-color="#3955A6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1E2761" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgB" cx="85%" cy="82%" r="48%">
      <stop offset="0%" stop-color="#CADCFC" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#CADCFC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="#1E2761"/>
  <rect width="1280" height="720" fill="url(#bgA)"/>
  <rect width="1280" height="720" fill="url(#bgB)"/>

  <!-- Eyebrow -->
  <text x="80" y="200" font-size="15" font-weight="500" letter-spacing="6"
        fill="#CADCFC" opacity="0.8">A CLAUDE SKILL</text>

  <!-- Main title -->
  <text x="80" y="340" font-size="112" font-weight="900" fill="#FFFFFF"
        letter-spacing="-2">DeckForge</text>

  <!-- Subtitle -->
  <text x="80" y="406" font-size="28" font-weight="400" fill="#CADCFC" opacity="0.92">
    為 Claude 打造的可編輯簡報 skill
  </text>

  <!-- Three short value props at bottom -->
  <g font-size="14" letter-spacing="2" fill="#FFFFFF" opacity="0.7">
    <text x="80" y="540">5-PHASE WORKFLOW</text>
    <text x="80" y="568" font-size="13" opacity="0.6" letter-spacing="0">
      研究 → 大綱 → 策劃 → 設計 → 產出
    </text>

    <text x="430" y="540">SVG-NATIVE</text>
    <text x="430" y="568" font-size="13" opacity="0.6" letter-spacing="0">
      向量輸出,不是圖片
    </text>

    <text x="780" y="540">EDITABLE IN POWERPOINT</text>
    <text x="780" y="568" font-size="13" opacity="0.6" letter-spacing="0">
      Convert to Shape → 完整可編輯
    </text>
  </g>

  <!-- Footer -->
  <text x="80" y="660" font-size="13" fill="#CADCFC" opacity="0.5">github.com/yeevclaw/deckforge</text>
  <text x="1200" y="660" font-size="13" fill="#CADCFC" opacity="0.5" text-anchor="end">01</text>
</svg>
