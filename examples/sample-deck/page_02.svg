<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress_ticks -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- title -->
  <text x="48" y="104" font-size="42" font-weight="800" fill="#344252">目錄</text>
  <text x="48" y="132" font-size="15" fill="#4C5A6B" letter-spacing="2">TABLE OF CONTENTS</text>

  <!-- row 1 -->
  <rect x="48" y="186" width="1184" height="148" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="108" y="290" font-size="84" font-weight="900" fill="#C9CFD9" style="font-variant-numeric: tabular-nums">01</text>
  <text x="280" y="262" font-size="30" font-weight="700" fill="#344252">為什麼 AI 簡報都長一樣</text>
  <text x="280" y="300" font-size="18" fill="#6B7686">兩個讓 AI 簡報千篇一律的失敗模式。</text>

  <!-- row 2 -->
  <rect x="48" y="350" width="1184" height="148" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="108" y="454" font-size="84" font-weight="900" fill="#C9CFD9" style="font-variant-numeric: tabular-nums">02</text>
  <text x="280" y="426" font-size="30" font-weight="700" fill="#344252">DeckForge 的方法:5 階段專家工作流</text>
  <text x="280" y="464" font-size="18" fill="#6B7686">反詰 → 大綱 → 策劃 → 設計 → 產出,逐步把簡報墊高到位。</text>

  <!-- row 3 -->
  <rect x="48" y="514" width="1184" height="148" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="108" y="618" font-size="84" font-weight="900" fill="#C9CFD9" style="font-variant-numeric: tabular-nums">03</text>
  <text x="280" y="590" font-size="30" font-weight="700" fill="#344252">產出:既好看,又真正可編輯</text>
  <text x="280" y="628" font-size="18" fill="#6B7686">SVG 雙嵌,PowerPoint 2016+ 可逐元素 Convert to Shape。</text>
</svg>
