<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', Inter, system-ui, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F7F9FC"/>

  <!-- Header -->
  <text x="48" y="92" font-size="40" font-weight="800" fill="#1E2761">五個階段,像專家團隊一樣協作</text>
  <text x="48" y="124" font-size="18" fill="#5A5A72">每階段都有 review checkpoint,改方向只要 30 秒</text>

  <!-- 5 columns of phase cards. Inner width 1184, gaps 4*20=80, card width (1184-80)/5 = 220.8 → use 221 -->
  <!-- Phase 1 -->
  <g>
    <rect x="48"  y="160" width="221" height="500" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="80" y="222" font-size="56" font-weight="900" fill="#CADCFC">01</text>
    <text x="80" y="284" font-size="20" font-weight="700" fill="#1E2761">需求調研</text>
    <text x="80" y="318" font-size="13" fill="#5A5A72" letter-spacing="2">RESEARCH</text>
    <text x="80" y="380" font-size="14" fill="#1A1A2E">
      <tspan x="80" dy="0">釐清觀眾、目的</tspan>
      <tspan x="80" dy="1.6em">語氣、長度、品牌</tspan>
      <tspan x="80" dy="1.6em">限制。</tspan>
    </text>
    <text x="80" y="610" font-size="12" fill="#5A5A72" opacity="0.7">→ brief.md</text>
  </g>

  <!-- Phase 2 -->
  <g>
    <rect x="289" y="160" width="221" height="500" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="321" y="222" font-size="56" font-weight="900" fill="#CADCFC">02</text>
    <text x="321" y="284" font-size="20" font-weight="700" fill="#1E2761">大綱架構</text>
    <text x="321" y="318" font-size="13" fill="#5A5A72" letter-spacing="2">OUTLINE</text>
    <text x="321" y="380" font-size="14" fill="#1A1A2E">
      <tspan x="321" dy="0">金字塔原理,每</tspan>
      <tspan x="321" dy="1.6em">頁標題都是一個</tspan>
      <tspan x="321" dy="1.6em">完整 claim。</tspan>
    </text>
    <text x="321" y="610" font-size="12" fill="#5A5A72" opacity="0.7">→ outline.json</text>
  </g>

  <!-- Phase 3 (highlighted as "secret sauce") -->
  <g>
    <rect x="530" y="160" width="221" height="500" rx="16" ry="16" fill="#1E2761" filter="url(#cardShadow)"/>
    <text x="562" y="222" font-size="56" font-weight="900" fill="#FFFFFF" opacity="0.5">03</text>
    <text x="562" y="284" font-size="20" font-weight="700" fill="#FFFFFF">策劃稿</text>
    <text x="562" y="318" font-size="13" fill="#CADCFC" letter-spacing="2">PLANNING</text>
    <text x="562" y="380" font-size="14" fill="#FFFFFF" opacity="0.9">
      <tspan x="562" dy="0">每頁實際內容 +</tspan>
      <tspan x="562" dy="1.6em">Bento Grid 版型。</tspan>
      <tspan x="562" dy="1.6em">大多數 AI 跳過的</tspan>
      <tspan x="562" dy="1.6em">關鍵步驟。</tspan>
    </text>
    <text x="562" y="610" font-size="12" fill="#CADCFC" opacity="0.85">★ 別跳過</text>
  </g>

  <!-- Phase 4 -->
  <g>
    <rect x="771" y="160" width="221" height="500" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="803" y="222" font-size="56" font-weight="900" fill="#CADCFC">04</text>
    <text x="803" y="284" font-size="20" font-weight="700" fill="#1E2761">設計稿</text>
    <text x="803" y="318" font-size="13" fill="#5A5A72" letter-spacing="2">DESIGN</text>
    <text x="803" y="380" font-size="14" fill="#1A1A2E">
      <tspan x="803" dy="0">產出每頁 SVG,</tspan>
      <tspan x="803" dy="1.6em">viewBox 1280×720,</tspan>
      <tspan x="803" dy="1.6em">完整 Bento Grid。</tspan>
    </text>
    <text x="803" y="610" font-size="12" fill="#5A5A72" opacity="0.7">→ pages/*.svg</text>
  </g>

  <!-- Phase 5 -->
  <g>
    <rect x="1012" y="160" width="220" height="500" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="1044" y="222" font-size="56" font-weight="900" fill="#CADCFC">05</text>
    <text x="1044" y="284" font-size="20" font-weight="700" fill="#1E2761">產出</text>
    <text x="1044" y="318" font-size="13" fill="#5A5A72" letter-spacing="2">PRODUCE</text>
    <text x="1044" y="380" font-size="14" fill="#1A1A2E">
      <tspan x="1044" dy="0">組成 .pptx,</tspan>
      <tspan x="1044" dy="1.6em">內嵌 SVG,</tspan>
      <tspan x="1044" dy="1.6em">PowerPoint 可</tspan>
      <tspan x="1044" dy="1.6em">編輯每一字元。</tspan>
    </text>
    <text x="1044" y="610" font-size="12" fill="#5A5A72" opacity="0.7">→ deck.pptx</text>
  </g>
</svg>
