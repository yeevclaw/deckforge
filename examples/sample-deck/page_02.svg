<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washLav" cx="92%" cy="4%" r="46%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="50%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="freshShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="104" font-size="42" font-weight="800" fill="#383838">目錄</text>
  <text x="48" y="132" font-size="15" fill="#6B7178" letter-spacing="2">TABLE OF CONTENTS</text>

  <!-- row 1 -->
  <rect x="48" y="186" width="1184" height="148" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <text x="108" y="290" font-size="84" font-weight="900" fill="#BFE3CB" style="font-variant-numeric: tabular-nums">01</text>
  <text x="280" y="262" font-size="30" font-weight="700" fill="#383838">為什麼 AI 簡報都長一樣</text>
  <text x="280" y="300" font-size="18" fill="#6B7178">兩個讓 AI 簡報千篇一律的失敗模式。</text>

  <!-- row 2 -->
  <rect x="48" y="350" width="1184" height="148" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <text x="108" y="454" font-size="84" font-weight="900" fill="#BFE3CB" style="font-variant-numeric: tabular-nums">02</text>
  <text x="280" y="426" font-size="30" font-weight="700" fill="#383838">DeckForge 的方法:5 階段專家工作流</text>
  <text x="280" y="464" font-size="18" fill="#6B7178">反詰 → 大綱 → 策劃 → 設計 → 產出,逐步把簡報墊高到位。</text>

  <!-- row 3 -->
  <rect x="48" y="514" width="1184" height="148" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <text x="108" y="618" font-size="84" font-weight="900" fill="#BFE3CB" style="font-variant-numeric: tabular-nums">03</text>
  <text x="280" y="590" font-size="30" font-weight="700" fill="#383838">產出:既好看,又真正可編輯</text>
  <text x="280" y="628" font-size="18" fill="#6B7178">SVG 雙嵌,PowerPoint 2016+ 可逐元素 Convert to Shape。</text>
</svg>
