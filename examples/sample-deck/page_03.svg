<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress_ticks -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- title -->
  <text x="48" y="104" font-size="34" font-weight="700" fill="#344252">AI 簡報工具,通常壞在兩個地方</text>
  <text x="48" y="134" font-size="15" fill="#4C5A6B" letter-spacing="2">TWO FAILURE MODES</text>

  <!-- card 1 -->
  <rect x="48" y="196" width="568" height="468" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <rect x="96" y="244" width="96" height="96" rx="14" fill="#E4E8EF"/>
  <g transform="translate(106 254) scale(3.2)" stroke="#344252" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect width="18" height="7" x="3" y="3" rx="1"/>
    <rect width="9" height="7" x="3" y="14" rx="1"/>
    <rect width="5" height="7" x="16" y="14" rx="1"/>
  </g>
  <text x="96" y="412" font-size="27" font-weight="700" fill="#344252">失敗一:從主題直接跳到版面</text>
  <rect x="150" y="443" width="82" height="27" rx="4" fill="#DDF5E8"/>
  <rect x="150" y="515" width="120" height="27" rx="4" fill="#DDF5E8"/>
  <text x="96" y="464" font-size="19" fill="#4C5A6B">
    <tspan x="96" dy="0">同一套<tspan fill="#344252" font-weight="700">回收模板</tspan>、罐頭條列、</tspan>
    <tspan x="96" dy="36">毫無思考。換了主題,</tspan>
    <tspan x="96" dy="36">投影片<tspan fill="#344252" font-weight="700">卻還是長一樣</tspan>——</tspan>
    <tspan x="96" dy="36">因為模板從來沒變過。</tspan>
  </text>

  <!-- card 2 -->
  <rect x="664" y="196" width="568" height="468" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <rect x="712" y="244" width="96" height="96" rx="14" fill="#E4E8EF"/>
  <g transform="translate(722 254) scale(3.2)" stroke="#344252" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4"/>
    <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
    <path d="M2 15h10"/>
    <path d="m9 18 3-3-3-3"/>
  </g>
  <text x="712" y="412" font-size="27" font-weight="700" fill="#344252">失敗二:把你的輸入當成內容</text>
  <rect x="823" y="479" width="133" height="27" rx="4" fill="#DDF5E8"/>
  <rect x="709" y="551" width="158" height="27" rx="4" fill="#DDF5E8"/>
  <text x="712" y="464" font-size="19" fill="#4C5A6B">
    <tspan x="712" dy="0">就算內容更講究,它們仍把</tspan>
    <tspan x="712" dy="36">使用者的輸入<tspan fill="#344252" font-weight="700">當成 deck 內容</tspan>。</tspan>
    <tspan x="712" dy="36">但你的輸入幾乎不含那個</tspan>
    <tspan x="712" dy="36"><tspan fill="#344252" font-weight="700">必須被改變的判斷</tspan>。</tspan>
  </text>
</svg>
