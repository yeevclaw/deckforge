<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washRose" cx="94%" cy="6%" r="46%">
      <stop offset="0%" stop-color="#F3D4D4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F3D4D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="50%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="freshShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washRose)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="104" font-size="34" font-weight="700" fill="#383838">AI 簡報工具,通常壞在兩個地方</text>
  <text x="48" y="134" font-size="15" fill="#6B7178" letter-spacing="2">TWO FAILURE MODES</text>

  <!-- card 1 -->
  <rect x="48" y="196" width="568" height="468" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <g transform="translate(96 244) scale(3.2)" stroke="#5E8FEF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect width="18" height="7" x="3" y="3" rx="1" fill="#D8E4FB"/>
    <rect width="9" height="7" x="3" y="14" rx="1" fill="#D8E4FB"/>
    <rect width="5" height="7" x="16" y="14" rx="1" fill="#FFFFFF"/>
  </g>
  <text x="96" y="412" font-size="27" font-weight="700" fill="#383838">失敗一:從主題直接跳到版面</text>
  <text x="96" y="464" font-size="19" fill="#4A5158">
    <tspan x="96" dy="0">同一套<tspan fill="#E8872E" font-weight="700">回收模板</tspan>、罐頭條列、</tspan>
    <tspan x="96" dy="36">毫無思考。換了主題,</tspan>
    <tspan x="96" dy="36">投影片<tspan fill="#E8872E" font-weight="700">卻還是長一樣</tspan>——</tspan>
    <tspan x="96" dy="36">因為模板從來沒變過。</tspan>
  </text>

  <!-- card 2 -->
  <rect x="664" y="196" width="568" height="468" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <g transform="translate(712 244) scale(3.2)" stroke="#5E8FEF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4" fill="#D8E4FB"/>
    <path d="M14 2v4a2 2 0 0 0 2 2h4" fill="#FFFFFF"/>
    <path d="M2 15h10"/>
    <path d="m9 18 3-3-3-3"/>
  </g>
  <text x="712" y="412" font-size="27" font-weight="700" fill="#383838">失敗二:把你的輸入當成內容</text>
  <text x="712" y="464" font-size="19" fill="#4A5158">
    <tspan x="712" dy="0">就算內容更講究,它們仍把</tspan>
    <tspan x="712" dy="36">使用者的輸入<tspan fill="#E8872E" font-weight="700">當成 deck 內容</tspan>。</tspan>
    <tspan x="712" dy="36">但你的輸入幾乎不含那個</tspan>
    <tspan x="712" dy="36"><tspan fill="#E8872E" font-weight="700">必須被改變的判斷</tspan>。</tspan>
  </text>
</svg>
