<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="heroBg" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="#000000"/>
  <rect width="1280" height="720" fill="url(#heroBg)"/>

  <!-- Page title bilingual -->
  <text x="48" y="86" font-size="44" font-weight="800" fill="#FFFFFF">為什麼用 SVG,而不是圖片?</text>
  <text x="48" y="114" font-size="16" font-weight="500" fill="#A0A0A0" letter-spacing="1">
    Why SVG, not raster?
  </text>

  <!-- One stat hero card: 100% editable -->
  <text x="640" y="420" font-size="180" font-weight="900" fill="#FF6900"
        text-anchor="middle" letter-spacing="-4">100%</text>
  <text x="640" y="480" font-size="22" fill="#FFFFFF" text-anchor="middle">投影片內容完整可編輯</text>
  <text x="640" y="510" font-size="13" fill="#666666" text-anchor="middle" letter-spacing="2">
    Convert to Shape · Every Text, Color, Icon Editable in PowerPoint
  </text>

  <!-- Three quiet support points at bottom -->
  <g font-size="11" letter-spacing="1">
    <rect x="80" y="588" width="360" height="68" rx="8" ry="8"
          fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
    <text x="100" y="616" fill="#666666">VECTOR</text>
    <text x="100" y="642" font-size="14" fill="#A0A0A0">無限放大,印刷可用</text>

    <rect x="460" y="588" width="360" height="68" rx="8" ry="8"
          fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
    <text x="480" y="616" fill="#666666">EDITABLE</text>
    <text x="480" y="642" font-size="14" fill="#A0A0A0">改字、換色,不用重跑</text>

    <rect x="840" y="588" width="360" height="68" rx="8" ry="8"
          fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
    <text x="860" y="616" fill="#666666">PORTABLE</text>
    <text x="860" y="642" font-size="14" fill="#A0A0A0">跨機器一致,system font</text>
  </g>

  <!-- Footer page number -->
  <text x="1200" y="710" font-size="12" fill="#666666" text-anchor="end">03 / 03</text>
</svg>
