    <text x="389" y="377" font-size="27" font-weight="700" fill="#344252" text-anchor="middle">大綱架構</text>
    <rect x="300" y="423" width="178" height="267" rx="14" fill="#FFFFFF" fill-opacity="0.88"/>
    <rect x="353" y="440" width="72" height="72" rx="14" fill="#E4E8EF"/>
    <g transform="translate(360 447) scale(2.4)" stroke="#344252" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
