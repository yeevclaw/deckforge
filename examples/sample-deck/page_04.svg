  <path d="M 35 720 L 35 470 Q 35 434 71 434 L 203 434 Q 239 434 239 470 L 239 720 Z" fill="url(#massBodyMint)"/>
  <path d="M 287 720 L 287 435 Q 287 399 323 399 L 455 399 Q 491 399 491 435 L 491 720 Z" fill="url(#massBodyLav)"/>
  <path d="M 538 720 L 538 400 Q 538 364 574 364 L 706 364 Q 742 364 742 400 L 742 720 Z" fill="url(#massBodyMint)"/>
  <path d="M 789 720 L 789 365 Q 789 329 825 329 L 957 329 Q 993 329 993 365 L 993 720 Z" fill="url(#massBodyLav)"/>
  <path d="M 1041 720 L 1041 330 Q 1041 294 1077 294 L 1209 294 Q 1245 294 1245 330 L 1245 720 Z" fill="url(#massBodyEnd)"/>

  <!-- step 1 (cx 137, top 430) -->
  <g>
    <rect x="93" y="353" width="88" height="30" rx="15" fill="#344252"/>
    <text x="137" y="374" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Phase 1</text>
    <text x="137" y="412" font-size="27" font-weight="700" fill="#344252" text-anchor="middle">反詰對話</text>
    <rect x="48" y="458" width="178" height="232" rx="14" fill="#FFFFFF" fill-opacity="0.88"/>
    <rect x="101" y="475" width="72" height="72" rx="14" fill="#E4E8EF"/>
    <g transform="translate(108 482) scale(2.4)" stroke="#344252" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
    </g>
    <text x="137" y="578" font-size="16" fill="#4C5A6B" text-anchor="middle">
      <tspan x="137" dy="0">蘇格拉底式提問</tspan><tspan x="137" dy="28">挖出核心命題</tspan>
    </text>
    <rect x="91" y="638" width="92" height="30" rx="6" fill="#EFFBF4" stroke="#58D494" stroke-width="1.5"/>
    <text x="137" y="658" font-size="15" font-weight="600" fill="#344252" text-anchor="middle">brief.md</text>
  </g>

