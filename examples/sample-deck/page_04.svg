  <text x="48" y="132" font-size="15" fill="#4C5A6B" letter-spacing="2">THE FIVE-PHASE WORKFLOW · 階段不可跳過,每階段交出一個檔案</text>

  <!-- low horizon mint sweep (drawn before the masses) -->
  <path d="M 90 612 Q 600 560 1170 450 L 1160 426 L 1258 466 L 1142 508 L 1158 478 Q 610 600 96 648 Z" fill="url(#sweepGrad)"/>

  <!-- outer halos (mint / lav alternating, final greener) -->
  <path d="M 7 720 L 7 470 Q 7 430 47 430 L 227 430 Q 267 430 267 470 L 267 720 Z" fill="url(#massHaloMint)"/>
  <path d="M 259 720 L 259 435 Q 259 395 299 395 L 479 395 Q 519 395 519 435 L 519 720 Z" fill="url(#massHaloLav)"/>
  <path d="M 510 720 L 510 400 Q 510 360 550 360 L 730 360 Q 770 360 770 400 L 770 720 Z" fill="url(#massHaloMint)"/>
  <path d="M 761 720 L 761 365 Q 761 325 801 325 L 981 325 Q 1021 325 1021 365 L 1021 720 Z" fill="url(#massHaloLav)"/>
  <path d="M 1013 720 L 1013 330 Q 1013 290 1053 290 L 1233 290 Q 1273 290 1273 330 L 1273 720 Z" fill="url(#massHaloEnd)"/>

