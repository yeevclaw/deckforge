    <rect x="833" y="533" width="116" height="30" rx="6" fill="#EFFBF4" stroke="#58D494" stroke-width="1.5"/>
    <text x="891" y="553" font-size="15" font-weight="600" fill="#344252" text-anchor="middle">page_NN.svg</text>
