  <!-- step 5 (cx 1143, top 290, greener end + slate_anchor output chip) -->
  <g>
    <rect x="1099" y="213" width="88" height="30" rx="15" fill="#344252"/>
    <text x="1143" y="234" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Phase 5</text>
    <text x="1143" y="272" font-size="27" font-weight="700" fill="#344252" text-anchor="middle">產出</text>
    <rect x="1054" y="318" width="178" height="372" rx="14" fill="#FFFFFF" fill-opacity="0.88"/>
    <rect x="1107" y="335" width="72" height="72" rx="14" fill="#E4E8EF"/>
    <g transform="translate(1114 342) scale(2.4)" stroke="#344252" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
