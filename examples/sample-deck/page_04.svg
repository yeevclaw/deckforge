      <rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>
    </g>
    <text x="891" y="473" font-size="16" fill="#4C5A6B" text-anchor="middle">
      <tspan x="891" dy="0">Bento 版面</tspan><tspan x="891" dy="28">逐頁繪 SVG</tspan>
