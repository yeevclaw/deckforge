<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress_ticks -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- title -->
  <text x="48" y="102" font-size="34" font-weight="700" fill="#344252">反詰對話不是成本,它就是產品本身</text>
  <text x="48" y="132" font-size="15" fill="#4C5A6B" letter-spacing="2">THE DIALOGUE IS THE PRODUCT</text>

  <!-- hero card -->
  <rect x="48" y="172" width="1184" height="496" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>

  <rect x="568" y="217" width="292" height="36" rx="4" fill="#DDF5E8"/>
  <text x="96" y="246" font-size="26" font-weight="700" fill="#344252">資料說的是「你」腦中有什麼;對話挖的是<tspan fill="#344252" font-weight="700">「觀眾」腦中該改變什麼</tspan></text>
  <text x="96" y="300" font-size="19" fill="#4C5A6B">
    <tspan x="96" dy="0">再完整的白皮書、再詳盡的 brief,都換不到這個。簡報真正要決定的,</tspan>
    <tspan x="96" dy="34">是觀眾看完後腦中該翻轉的那一個判斷——這只能靠反詰一層層挖出來。</tspan>
  </text>

  <!-- 3 nested sub-cards -->
  <rect x="96" y="404" width="346" height="232" rx="12" fill="#E4E8EF"/>
  <rect x="466" y="404" width="346" height="232" rx="12" fill="#E4E8EF"/>
  <rect x="836" y="404" width="346" height="232" rx="12" fill="#E4E8EF"/>

  <text x="269" y="528" font-size="86" font-weight="800" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">4</text>
  <text x="269" y="572" font-size="20" font-weight="700" fill="#344252" text-anchor="middle">個非協商欄位</text>
  <text x="269" y="600" font-size="13" fill="#4C5A6B" text-anchor="middle" letter-spacing="1">NON-NEGOTIABLE</text>

  <text x="639" y="528" font-size="86" font-weight="800" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">2–3</text>
  <text x="639" y="572" font-size="20" font-weight="700" fill="#344252" text-anchor="middle">輪高槓桿提問</text>
  <text x="639" y="600" font-size="13" fill="#4C5A6B" text-anchor="middle" letter-spacing="1">ROUNDS</text>

  <text x="1009" y="528" font-size="86" font-weight="800" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">1</text>
  <text x="1009" y="572" font-size="20" font-weight="700" fill="#344252" text-anchor="middle">個核心命題</text>
  <text x="1009" y="600" font-size="13" fill="#4C5A6B" text-anchor="middle" letter-spacing="1">CORE THESIS</text>
</svg>
