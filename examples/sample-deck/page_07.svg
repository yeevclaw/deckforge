<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- canvas + wash pair + corner bloom -->
  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress ticks -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- title — slate assertion, no pill bar, no underline -->
  <text x="48" y="102" font-size="34" font-weight="700" fill="#344252">一般 AI 簡報工具 vs DeckForge</text>
  <text x="48" y="132" font-size="15" fill="#4C5A6B" letter-spacing="2">GENERIC AI DECKS vs DECKFORGE</text>

  <!-- recommended-column tag pill (green border, ink text) -->
  <rect x="820" y="158" width="288" height="44" rx="14" fill="#EFFBF4" stroke="#58D494" stroke-width="2"/>
  <text x="964" y="187" font-size="20" font-weight="700" fill="#344252" text-anchor="middle">這是一套方法論</text>

  <!-- column cards -->
  <rect x="160" y="214" width="512" height="454" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <rect x="696" y="214" width="536" height="454" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>

  <!-- slate header bands (white text on slate) -->
  <path d="M 160 276 L 160 228 A 14 14 0 0 1 174 214 L 658 214 A 14 14 0 0 1 672 228 L 672 276 Z" fill="#344252"/>
  <path d="M 696 276 L 696 228 A 14 14 0 0 1 710 214 L 1218 214 A 14 14 0 0 1 1232 228 L 1232 276 Z" fill="#344252"/>
  <text x="416" y="254" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">一般 AI 簡報工具</text>
  <text x="964" y="254" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">DeckForge</text>

  <!-- dimension labels (left gutter) -->
  <g font-size="18" font-weight="700" fill="#4C5A6B" text-anchor="middle">
    <text x="100" y="343">起點</text>
    <text x="100" y="408"><tspan x="100" dy="0">內容</tspan><tspan x="100" dy="24">來源</tspan></text>
    <text x="100" y="485">結構</text>
    <text x="100" y="551">設計</text>
    <text x="100" y="604"><tspan x="100" dy="0">可編</tspan><tspan x="100" dy="24">輯性</tspan></text>
  </g>

  <!-- hairline row separators -->
  <g stroke="#DFE2E9" stroke-width="1">
    <line x1="186" y1="372" x2="646" y2="372"/><line x1="722" y1="372" x2="1208" y2="372"/>
    <line x1="186" y1="438" x2="646" y2="438"/><line x1="722" y1="438" x2="1208" y2="438"/>
    <line x1="186" y1="504" x2="646" y2="504"/><line x1="722" y1="504" x2="1208" y2="504"/>
    <line x1="186" y1="570" x2="646" y2="570"/><line x1="722" y1="570" x2="1208" y2="570"/>
  </g>

  <!-- left column values -->
  <g font-size="19" fill="#4C5A6B">
    <text x="186" y="345">主題 → 直接套版</text>
    <text x="186" y="411">把使用者輸入當內容</text>
    <text x="186" y="477">罐頭條列</text>
    <text x="186" y="543">回收模板,千篇一律</text>
    <text x="186" y="609">圖片或鎖死版面</text>
  </g>

  <!-- right column values (recommended) — emphasis bands painted before the text -->
  <rect x="833" y="326" width="82" height="26" rx="4" fill="#DDF5E8"/>
  <rect x="757" y="392" width="158" height="26" rx="4" fill="#DDF5E8"/>
  <rect x="864" y="590" width="157" height="26" rx="4" fill="#DDF5E8"/>
  <g font-size="19" fill="#4C5A6B">
    <text x="722" y="345">反詰對話挖出<tspan font-weight="700" fill="#344252">核心命題</tspan></text>
    <text x="722" y="411">決定<tspan font-weight="700" fill="#344252">觀眾該改變的判斷</tspan></text>
    <text x="722" y="477">金字塔論證,逐頁防守標題</text>
    <text x="722" y="543">Bento + 單一強調色 + 防 slop</text>
    <text x="722" y="609">PowerPoint 原生 <tspan font-weight="700" fill="#344252">Convert-to-Shape</tspan></text>
  </g>
</svg>
