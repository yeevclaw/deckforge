<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washLav" cx="92%" cy="8%" r="46%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="50%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="freshShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="102" font-size="34" font-weight="700" fill="#383838">產出可在 PowerPoint 原生編輯的每一個元素</text>
  <text x="48" y="132" font-size="15" fill="#6B7178" letter-spacing="2">GENUINELY EDITABLE OUTPUT</text>

  <!-- wide card -->
  <rect x="48" y="180" width="760" height="488" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <g transform="translate(96 226) scale(3.2)" stroke="#5E8FEF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12.5 22H18a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v9.5" fill="#D8E4FB"/>
    <path d="M14 2v4a2 2 0 0 0 2 2h4" fill="#FFFFFF"/>
    <path d="M13.378 15.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z" fill="#FFFFFF"/>
  </g>
  <text x="96" y="392" font-size="27" font-weight="700" fill="#383838">每張投影片同時嵌兩份畫面</text>
  <text x="96" y="440" font-size="19" fill="#4A5158">
    <tspan x="96" dy="0">PNG fallback 給 Keynote、舊版</tspan>
    <tspan x="96" dy="33">PowerPoint 與預覽程式;原始 SVG 透過</tspan>
    <tspan x="96" dy="33">PowerPoint 2016+ 的 svgBlip 擴充嵌入。</tspan>
    <tspan x="96" dy="33">右鍵 <tspan fill="#E8872E" font-weight="700">Convert to Shape</tspan>,每個卡片、</tspan>
    <tspan x="96" dy="33">標題、圖示都變成原生可編輯的</tspan>
    <tspan x="96" dy="33">形狀與文字框。</tspan>
  </text>

  <!-- narrow card -->
  <rect x="832" y="180" width="400" height="488" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <text x="880" y="246" font-size="24" font-weight="700" fill="#383838">同時交付三個檔案</text>

  <!-- file row 1 -->
  <g transform="translate(880 300) scale(1.5)" stroke="#5E8FEF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z" fill="#D8E4FB"/>
    <path d="M14 2v6h6" fill="#FFFFFF"/>
  </g>
  <text x="932" y="320" font-size="22" font-weight="700" fill="#383838">deck.pptx</text>
  <text x="932" y="348" font-size="17" fill="#6B7178">在 PowerPoint 逐元素編輯</text>

  <!-- file row 2 -->
  <g transform="translate(880 392) scale(1.5)" stroke="#5E8FEF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z" fill="#D8E4FB"/>
    <path d="M14 2v6h6" fill="#FFFFFF"/>
  </g>
  <text x="932" y="412" font-size="22" font-weight="700" fill="#383838">deck.pdf</text>
  <text x="932" y="440" font-size="17" fill="#6B7178">給任何人直接分享</text>

  <!-- file row 3 -->
  <g transform="translate(880 484) scale(1.5)" stroke="#5E8FEF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z" fill="#D8E4FB"/>
    <path d="M14 2v6h6" fill="#FFFFFF"/>
  </g>
  <text x="932" y="504" font-size="22" font-weight="700" fill="#383838">deck.notes.md</text>
  <text x="932" y="532" font-size="17" fill="#6B7178">講者備忘 (Markdown)</text>

  <!-- closing note -->
  <text x="880" y="610" font-size="17" fill="#4A5158">
    <tspan x="880" dy="0">三個檔案<tspan fill="#E8872E" font-weight="700">一次交付</tspan>,</tspan>
    <tspan x="880" dy="28">不必再各別匯出。</tspan>
  </text>
</svg>
