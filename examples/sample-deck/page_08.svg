<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- canvas + wash pair + corner bloom -->
  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress ticks -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- title — slate assertion, no pill bar, no underline -->
  <text x="48" y="102" font-size="34" font-weight="700" fill="#344252">產出可在 PowerPoint 原生編輯的每一個元素</text>
  <text x="48" y="132" font-size="15" fill="#4C5A6B" letter-spacing="2">GENUINELY EDITABLE OUTPUT</text>

  <!-- wide card -->
  <rect x="48" y="180" width="760" height="488" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <rect x="82" y="210" width="110" height="110" rx="16" fill="#E4E8EF" filter="url(#prismShadow)"/>
  <g transform="translate(96 226) scale(3.2)" stroke="#344252" stroke-width="0.65" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12.5 22H18a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v9.5"/>
    <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
    <path d="M13.378 15.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/>
  </g>
  <text x="96" y="392" font-size="27" font-weight="700" fill="#344252">每張投影片同時嵌兩份畫面</text>
  <rect x="136" y="520" width="154" height="26" rx="4" fill="#DDF5E8"/>
  <text x="96" y="440" font-size="19" fill="#4C5A6B">
    <tspan x="96" dy="0">PNG fallback 給 Keynote、舊版</tspan>
    <tspan x="96" dy="33">PowerPoint 與預覽程式;原始 SVG 透過</tspan>
    <tspan x="96" dy="33">PowerPoint 2016+ 的 svgBlip 擴充嵌入。</tspan>
    <tspan x="96" dy="33">右鍵 <tspan font-weight="700" fill="#344252">Convert to Shape</tspan>,每個卡片、</tspan>
    <tspan x="96" dy="33">標題、圖示都變成原生可編輯的</tspan>
    <tspan x="96" dy="33">形狀與文字框。</tspan>
  </text>

  <!-- narrow card -->
  <rect x="832" y="180" width="400" height="488" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="880" y="246" font-size="24" font-weight="700" fill="#344252">同時交付三個檔案</text>

  <!-- file row 1 -->
  <rect x="874" y="296" width="48" height="48" rx="12" fill="#E4E8EF"/>
  <g transform="translate(880 300) scale(1.5)" stroke="#344252" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
    <path d="M14 2v6h6"/>
  </g>
  <text x="932" y="320" font-size="22" font-weight="700" fill="#344252">deck.pptx</text>
  <text x="932" y="348" font-size="17" fill="#6B7686">在 PowerPoint 逐元素編輯</text>

  <!-- file row 2 -->
  <rect x="874" y="388" width="48" height="48" rx="12" fill="#E4E8EF"/>
  <g transform="translate(880 392) scale(1.5)" stroke="#344252" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
    <path d="M14 2v6h6"/>
  </g>
  <text x="932" y="412" font-size="22" font-weight="700" fill="#344252">deck.pdf</text>
  <text x="932" y="440" font-size="17" fill="#6B7686">給任何人直接分享</text>

  <!-- file row 3 -->
  <rect x="874" y="480" width="48" height="48" rx="12" fill="#E4E8EF"/>
  <g transform="translate(880 484) scale(1.5)" stroke="#344252" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
    <path d="M14 2v6h6"/>
  </g>
  <text x="932" y="504" font-size="22" font-weight="700" fill="#344252">deck.notes.md</text>
  <text x="932" y="532" font-size="17" fill="#6B7686">講者備忘 (Markdown)</text>

  <!-- closing note -->
  <rect x="945" y="594" width="74" height="23" rx="4" fill="#DDF5E8"/>
  <text x="880" y="610" font-size="17" fill="#4C5A6B">
    <tspan x="880" dy="0">三個檔案<tspan font-weight="700" fill="#344252">一次交付</tspan>,</tspan>
    <tspan x="880" dy="28">不必再各別匯出。</tspan>
  </text>
</svg>
