<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- canvas + wash pair + corner bloom -->
  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress ticks -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- title — slate assertion, no pill bar, no underline -->
  <text x="48" y="104" font-size="34" font-weight="700" fill="#344252">三個數字,說明這套系統有多完整</text>
  <text x="48" y="134" font-size="15" fill="#4C5A6B" letter-spacing="2">THE SYSTEM, IN NUMBERS</text>

  <!-- card 1 -->
  <rect x="48" y="200" width="378" height="416" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="237" y="430" font-size="150" font-weight="800" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">5</text>
  <rect x="207" y="452" width="60" height="4" rx="2" fill="#58D494"/>
  <text x="237" y="498" font-size="25" font-weight="700" fill="#344252" text-anchor="middle">個不可跳過的階段</text>
  <text x="237" y="532" font-size="15" fill="#6B7686" text-anchor="middle" letter-spacing="2">PHASES</text>

  <!-- card 2 -->
  <rect x="450" y="200" width="378" height="416" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="639" y="430" font-size="150" font-weight="800" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">17</text>
  <rect x="609" y="452" width="60" height="4" rx="2" fill="#58D494"/>
  <text x="639" y="498" font-size="25" font-weight="700" fill="#344252" text-anchor="middle">種版面</text>
  <text x="639" y="530" font-size="16" fill="#6B7686" text-anchor="middle">8 Bento + 9 圖解原語</text>

  <!-- card 3 -->
  <rect x="852" y="200" width="378" height="416" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="1041" y="430" font-size="150" font-weight="800" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">27</text>
  <rect x="1011" y="452" width="60" height="4" rx="2" fill="#58D494"/>
  <text x="1041" y="498" font-size="25" font-weight="700" fill="#344252" text-anchor="middle">個 SVG 起始模板</text>
  <text x="1041" y="532" font-size="15" fill="#6B7686" text-anchor="middle" letter-spacing="2">TEMPLATES</text>
</svg>
