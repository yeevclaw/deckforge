<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="52%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washLav" cx="94%" cy="6%" r="44%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <filter id="freshShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="104" font-size="34" font-weight="700" fill="#383838">三個數字,說明這套系統有多完整</text>
  <text x="48" y="134" font-size="15" fill="#6B7178" letter-spacing="2">THE SYSTEM, IN NUMBERS</text>

  <!-- card 1 -->
  <rect x="48" y="200" width="378" height="416" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <text x="237" y="430" font-size="150" font-weight="800" fill="#E8872E" text-anchor="middle" style="font-variant-numeric: tabular-nums">5</text>
  <text x="237" y="498" font-size="25" font-weight="700" fill="#383838" text-anchor="middle">個不可跳過的階段</text>
  <text x="237" y="532" font-size="15" fill="#6B7178" text-anchor="middle" letter-spacing="2">PHASES</text>

  <!-- card 2 -->
  <rect x="450" y="200" width="378" height="416" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <text x="639" y="430" font-size="150" font-weight="800" fill="#E8872E" text-anchor="middle" style="font-variant-numeric: tabular-nums">17</text>
  <text x="639" y="498" font-size="25" font-weight="700" fill="#383838" text-anchor="middle">種版面</text>
  <text x="639" y="530" font-size="16" fill="#6B7178" text-anchor="middle">8 Bento + 9 圖解原語</text>

  <!-- card 3 -->
  <rect x="852" y="200" width="378" height="416" rx="16" fill="#FFFFFF" filter="url(#freshShadow)"/>
  <text x="1041" y="430" font-size="150" font-weight="800" fill="#E8872E" text-anchor="middle" style="font-variant-numeric: tabular-nums">27</text>
  <text x="1041" y="498" font-size="25" font-weight="700" fill="#383838" text-anchor="middle">個 SVG 起始模板</text>
  <text x="1041" y="532" font-size="15" fill="#6B7178" text-anchor="middle" letter-spacing="2">TEMPLATES</text>
</svg>
