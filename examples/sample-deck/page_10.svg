<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="55%">
      <stop offset="0%" stop-color="#56BE85"/>
      <stop offset="42%" stop-color="#5BA7D6"/>
      <stop offset="80%" stop-color="#7378E0"/>
      <stop offset="100%" stop-color="#878DEB"/>
    </linearGradient>
    <radialGradient id="glowTR" cx="86%" cy="8%" r="42%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#coverGrad)"/>
  <rect width="1280" height="720" fill="url(#glowTR)"/>

  <!-- aurora ribbons -->
  <g fill="#FFFFFF">
    <path d="M -60 560 C 280 450, 620 620, 940 490
             C 1130 413, 1250 400, 1340 385
             L 1340 480
             C 1250 495, 1150 515, 960 590
             C 640 716, 300 560, -60 670 Z" fill-opacity="0.07"/>
    <path d="M -60 680 C 320 580, 700 716, 1020 600
             C 1180 542, 1290 532, 1340 526
             L 1340 720 L -60 720 Z" fill-opacity="0.10"/>
  </g>

  <!-- closing block -->
  <text x="120" y="296" font-size="52" font-weight="800" fill="#FFFFFF">一行指令,開始打造你的下一份簡報</text>

  <!-- command band -->
  <rect x="124" y="344" width="560" height="58" rx="10" fill="#FFFFFF" fill-opacity="0.16"/>
  <text x="152" y="382" font-size="24" font-weight="700" fill="#FFFFFF" font-family="'SFMono-Regular', Menlo, Consolas, monospace">bash scripts/setup.sh</text>

  <text x="124" y="452" font-size="22" fill="#FFFFFF" fill-opacity="0.95">然後說一句:「幫我做一份關於 X 的簡報」</text>

  <text x="124" y="556" font-size="19" fill="#FFFFFF" fill-opacity="0.85">github.com/yeevclaw/deckforge</text>
</svg>
