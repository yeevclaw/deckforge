    <linearGradient id="baseTint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F3FB"/>
      <stop offset="55%" stop-color="#FAFAFC"/>
      <stop offset="100%" stop-color="#F0F8F4"/>
    </linearGradient>
  </defs>

  <!-- Near-white base with a whisper of lavender→mint -->
  <rect width="1280" height="720" fill="url(#baseTint)"/>

