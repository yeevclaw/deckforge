<?xml version="1.0" encoding="UTF-8"?>
<!--
  page_02 — chart_waterfall in IT_prism (A→B revenue bridge).
  Data: 2023營收 180 · 智慧家居 +55 · 訂閱服務 +70 · 海外市場 +30 · 配件調整 −25 · 2025營收 310.
  Scale 1.15px/unit, baseline y=400 (inside translate 152,200). Prism neutrals:
  totals #344252 · increases accent-green #58D494 · decrease #AEB4BA · annotation ink #344252.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>

  <!-- corner_bloom top-right: green radial + white dashed rotated square -->
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress_ticks -->
  <g>
    <rect x="948" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- title: slate assertion, no pill bar -->
  <text x="48" y="102" font-size="34" font-weight="700" fill="#344252">訂閱服務與海外市場,貢獻近八成營收增長</text>
  <text x="48" y="132" font-size="15" fill="#4C5A6B" letter-spacing="2">SERVICES &amp; OVERSEAS DRIVE NEARLY 80% OF GROWTH</text>

  <!-- chart card -->
  <rect x="48" y="156" width="1184" height="516" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>

  <!-- plot -->
  <g transform="translate(152, 220)">
    <text x="0" y="-8" font-size="13" fill="#6B7686">單位:NT$億</text>

    <!-- baseline -->
    <line x1="0" y1="400" x2="1000" y2="400" stroke="#DFE2E9" stroke-width="1"/>

    <!-- start total -->
    <rect x="0" y="193" width="110" height="207" fill="#344252"/>
    <!-- increases (claim drivers full green; background driver muted 0.45) -->
    <rect x="178" y="130" width="110" height="63" fill="#58D494" fill-opacity="0.45"/>
    <rect x="356" y="49"  width="110" height="81" fill="#58D494"/>
    <rect x="534" y="15"  width="110" height="34" fill="#58D494"/>
    <!-- decrease (neutral gray, never red) -->
    <rect x="712" y="15"  width="110" height="29" fill="#AEB4BA"/>
    <!-- end total -->
    <rect x="890" y="44"  width="110" height="356" fill="#344252"/>

    <!-- level connectors (dashed, ink voice) -->
    <line x1="110" y1="193" x2="178" y2="193" stroke="#C8CDD2" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="288" y1="130" x2="356" y2="130" stroke="#C8CDD2" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="466" y1="49"  x2="534" y2="49"  stroke="#C8CDD2" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="644" y1="15"  x2="712" y2="15"  stroke="#C8CDD2" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="822" y1="44"  x2="890" y2="44"  stroke="#C8CDD2" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- value labels -->
    <text x="55"  y="181" font-size="16" font-weight="700" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">180</text>
    <text x="233" y="118" font-size="15" font-weight="700" fill="#6B7686" text-anchor="middle" style="font-variant-numeric: tabular-nums">+55</text>
    <text x="411" y="37"  font-size="15" font-weight="700" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">+70</text>
    <text x="589" y="3"   font-size="15" font-weight="700" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">+30</text>
    <text x="767" y="3"   font-size="15" font-weight="700" fill="#6B7686" text-anchor="middle" style="font-variant-numeric: tabular-nums">−25</text>
    <text x="945" y="32"  font-size="16" font-weight="700" fill="#344252" text-anchor="middle" style="font-variant-numeric: tabular-nums">310</text>

    <!-- annotation 1: grouping bracket over the two claim drivers (ink, bold) -->
    <line x1="356" y1="-16" x2="644" y2="-16" stroke="#344252" stroke-width="1.5"/>
    <line x1="356" y1="-16" x2="356" y2="-9"  stroke="#344252" stroke-width="1.5"/>
    <line x1="644" y1="-16" x2="644" y2="-9"  stroke="#344252" stroke-width="1.5"/>
    <text x="500" y="-28" font-size="15" font-weight="700" fill="#344252" text-anchor="middle">+100 · 佔增長 77%</text>

    <!-- annotation 2: start↔end diff bracket (ink) -->
    <line x1="1008" y1="44"  x2="1008" y2="193" stroke="#344252" stroke-width="1.5"/>
    <line x1="1000" y1="44"  x2="1016" y2="44"  stroke="#344252" stroke-width="1.5"/>
    <line x1="1000" y1="193" x2="1016" y2="193" stroke="#344252" stroke-width="1.5"/>
    <text x="1022" y="124" font-size="17" font-weight="700" fill="#344252" text-anchor="start">+72%</text>

    <!-- category labels -->
    <text x="55"  y="432" font-size="14" fill="#4C5A6B" text-anchor="middle">2023營收</text>
    <text x="233" y="432" font-size="14" fill="#4C5A6B" text-anchor="middle">智慧家居</text>
    <text x="411" y="432" font-size="14" fill="#4C5A6B" text-anchor="middle">訂閱服務</text>
    <text x="589" y="432" font-size="14" fill="#4C5A6B" text-anchor="middle">海外市場</text>
    <text x="767" y="432" font-size="14" fill="#4C5A6B" text-anchor="middle">配件調整</text>
    <text x="945" y="432" font-size="14" fill="#4C5A6B" text-anchor="middle">2025營收</text>

    <!-- EN sub-labels -->
    <text x="55"  y="454" font-size="10" fill="#6B7686" text-anchor="middle" letter-spacing="1">FY2023</text>
    <text x="233" y="454" font-size="10" fill="#6B7686" text-anchor="middle" letter-spacing="1">SMART HOME</text>
    <text x="411" y="454" font-size="10" fill="#6B7686" text-anchor="middle" letter-spacing="1">SERVICES</text>
    <text x="589" y="454" font-size="10" fill="#6B7686" text-anchor="middle" letter-spacing="1">OVERSEAS</text>
    <text x="767" y="454" font-size="10" fill="#6B7686" text-anchor="middle" letter-spacing="1">ACCESSORIES</text>
    <text x="945" y="454" font-size="10" fill="#6B7686" text-anchor="middle" letter-spacing="1">FY2025</text>
  </g>
</svg>
