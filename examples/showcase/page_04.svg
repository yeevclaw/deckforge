<?xml version="1.0" encoding="UTF-8"?>
<!-- page_04 — bento lead_plus_pair: one lead claim (editability) + two support cards. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-25%" y="-25%" width="150%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset in="blur" dx="0" dy="5" result="off"/>
      <feComponentTransfer in="off" result="shadow">
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>

  <!-- corner_bloom top-right: green radial + white dashed rotated square -->
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress_ticks -->
  <g>
    <rect x="948" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- title: slate assertion, no pill bar -->
  <text x="48" y="106" font-size="40" font-weight="800" fill="#344252">交付的是能逐一元素編輯的 PPT,不是截圖</text>

  <!-- lead card (≈60%) -->
  <rect x="48" y="168" width="700" height="474" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <rect x="96" y="204" width="124" height="124" rx="16" fill="#E4E8EF"/>
  <g transform="translate(104 212)">
    <g transform="scale(4.5)" fill="none" stroke="#344252" stroke-width="0.45" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.4 2.6a2 2 0 0 1 3 3L12 15l-4 1 1-4Z"/>
    </g>
  </g>
  <text x="100" y="392" font-size="32" font-weight="700" fill="#344252">
    <tspan x="100" dy="0">每個文字、卡片、圖示,</tspan>
    <tspan x="100" dy="44">都能在 PowerPoint 原生編輯。</tspan>
  </text>
  <rect x="134" y="514" width="216" height="30" rx="4" fill="#DDF5E8"/>
  <text x="100" y="502" font-size="19" fill="#4C5A6B">
    <tspan x="100" dy="0">右鍵「轉換成圖形」,SVG 內容層就</tspan>
    <tspan x="100" dy="34">拆成<tspan font-weight="700" fill="#344252">可自由移動、改字、換色</tspan>的形狀;</tspan>
    <tspan x="100" dy="34">漸層與玻璃態則留在可整體移動的背景圖。</tspan>
  </text>

  <!-- support card A: two-layer decomposition -->
  <rect x="772" y="168" width="460" height="226" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <rect x="797" y="193" width="68" height="68" rx="12" fill="#E4E8EF"/>
  <g transform="translate(802 198)">
    <g transform="scale(2.4)" fill="none" stroke="#344252" stroke-width="0.85" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.8 2.2a2 2 0 0 0-1.6 0L2.6 6.1a1 1 0 0 0 0 1.8l8.6 3.9a2 2 0 0 0 1.6 0l8.6-3.9a1 1 0 0 0 0-1.8Z"/>
      <path d="m22 12.5-9.2 4.2a2 2 0 0 1-1.6 0L2 12.5"/>
      <path d="m22 17.5-9.2 4.2a2 2 0 0 1-1.6 0L2 17.5"/>
    </g>
  </g>
  <text x="874" y="240" font-size="22" font-weight="700" fill="#344252">雙層分解</text>
  <rect x="907" y="310" width="78" height="28" rx="4" fill="#DDF5E8"/>
  <text x="802" y="302" font-size="18" fill="#4C5A6B">
    <tspan x="802" dy="0">背景圖承載氛圍、內容層</tspan>
    <tspan x="802" dy="30">承載可編輯的<tspan font-weight="700" fill="#344252">向量物件</tspan>。</tspan>
  </text>

  <!-- support card B: three files delivered -->
  <rect x="772" y="416" width="460" height="226" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <rect x="797" y="441" width="68" height="68" rx="12" fill="#E4E8EF"/>
  <g transform="translate(802 446)">
    <g transform="scale(2.4)" fill="none" stroke="#344252" stroke-width="0.85" stroke-linecap="round" stroke-linejoin="round">
      <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
      <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
    </g>
  </g>
  <text x="874" y="488" font-size="22" font-weight="700" fill="#344252">三檔一次交付</text>
  <rect x="799" y="558" width="132" height="28" rx="4" fill="#DDF5E8"/>
  <text x="802" y="550" font-size="18" fill="#4C5A6B">
    <tspan x="802" dy="0">.pptx + .pdf + 講者備忘,</tspan>
    <tspan x="802" dy="30"><tspan font-weight="700" fill="#344252">不必再各別匯出</tspan>。</tspan>
  </text>
</svg>
