<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Slide</title>
<style>
  :root {
    /* Palette — overridden per page based on design_brief.palette_hint */
    --primary: #1E2761;
    --secondary: #CADCFC;
    --accent: #FFFFFF;
    --bg: #F7F9FC;
    --text: #1A1A2E;
    --text-muted: #5A5A72;

    /* Geometry */
    --slide-w: 1280px;
    --slide-h: 720px;
    --pad: 48px;
    --gap: 20px;
    --card-radius: 16px;

    /* Typography */
    --font-header: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Hiragino Sans", Inter, system-ui, -apple-system, sans-serif;
    --font-body: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    width: var(--slide-w);
    height: var(--slide-h);
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .slide {
    width: 100%;
    height: 100%;
    padding: var(--pad);
    display: flex;
    flex-direction: column;
  }

  .slide-header {
    flex: 0 0 auto;
    margin-bottom: 32px;
  }

  .slide-title {
    font-family: var(--font-header);
    font-size: 40px;
    font-weight: 800;
    color: var(--primary);
    margin: 0;
    line-height: 1.2;
  }
  .slide-subtitle {
    font-size: 18px;
    color: var(--text-muted);
    margin: 8px 0 0;
    line-height: 1.4;
  }

  .bento {
    flex: 1 1 auto;
    display: grid;
    gap: var(--gap);
    min-height: 0;
  }
  .bento.single_focus  { grid-template-columns: 1fr; }
  .bento.two_col_50_50 { grid-template-columns: 1fr 1fr; }
  .bento.two_col_2_1   { grid-template-columns: 2fr 1fr; }
  .bento.three_col     { grid-template-columns: 1fr 1fr 1fr; }
  .bento.hero_top      { grid-template-columns: repeat(4, 1fr); grid-template-rows: 1fr 1fr; }
  .bento.hero_top > .card.hero { grid-column: 1 / -1; }
  .bento.mixed_grid    { grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(3, 1fr); }

  /* --- Card base + motif: rounded_cards_soft_shadow (default) --- */
  .card {
    background: #fff;
    border-radius: var(--card-radius);
    padding: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }
  .card.large h3 { font-size: 26px; }
  .card.large p { font-size: 16px; }

  .card .icon-wrap {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: color-mix(in oklab, var(--secondary) 80%, #fff);
    display: grid;
    place-items: center;
    flex: 0 0 auto;
  }
  .card .icon-wrap svg {
    width: 24px; height: 24px;
    stroke: var(--primary);
    stroke-width: 2;
    fill: none;
  }
  .card h3 {
    font-family: var(--font-header);
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    margin: 0;
    line-height: 1.3;
  }
  .card p {
    font-size: 15px;
    color: var(--text);
    margin: 0;
    line-height: 1.55;
  }
  .card .stat {
    font-family: var(--font-header);
    font-size: 56px;
    font-weight: 800;
    color: var(--primary);
    line-height: 1;
  }
  .card .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Motif variant: left_accent_bar */
  body.motif-left_accent_bar .card {
    position: relative;
    padding-left: 30px;
  }
  body.motif-left_accent_bar .card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: var(--primary);
    border-radius: 6px 0 0 6px;
  }

  /* Motif variant: gradient_mesh_bg */
  body.motif-gradient_mesh_bg {
    background:
      radial-gradient(circle at 15% 20%, color-mix(in oklab, var(--primary) 28%, transparent), transparent 55%),
      radial-gradient(circle at 85% 80%, color-mix(in oklab, var(--accent) 22%, transparent), transparent 55%),
      var(--bg);
  }

  .footer {
    flex: 0 0 auto;
    margin-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-muted);
    font-size: 12px;
  }
</style>
</head>
<body class="motif-rounded_cards_soft_shadow">
  <div class="slide">
    <header class="slide-header">
      <h1 class="slide-title">頁面標題</h1>
      <p class="slide-subtitle">頁面副標題</p>
    </header>

    <main class="bento single_focus">
      <article class="card">
        <h3>卡片標題</h3>
        <p>卡片內容說明。</p>
      </article>
    </main>

    <footer class="footer">
      <span>{{deck_title}}</span>
      <span>{{page_id}} / {{page_count}}</span>
    </footer>
  </div>
</body>
</html>
