<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Bento 2-column</title>
<style>
  :root {
    --primary: #1E2761; --secondary: #CADCFC; --accent: #FFFFFF;
    --bg: #F7F9FC; --text: #1A1A2E; --text-muted: #5A5A72;
    --slide-w: 1280px; --slide-h: 720px; --pad: 48px; --gap: 20px; --card-radius: 16px;
    --font-header: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
    --font-body:   "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { width: var(--slide-w); height: var(--slide-h); background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
  .slide { width: 100%; height: 100%; padding: var(--pad); display: flex; flex-direction: column; }
  .slide-title { font-family: var(--font-header); font-size: 40px; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.2; }
  .slide-subtitle { font-size: 18px; color: var(--text-muted); margin: 8px 0 32px; line-height: 1.4; }
  .bento { flex: 1; display: grid; gap: var(--gap); grid-template-columns: 1fr 1fr; min-height: 0; }
  /* For asymmetric two_col_2_1, switch grid-template-columns to 2fr 1fr */
  .card { background: #fff; border-radius: var(--card-radius); padding: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); display: flex; flex-direction: column; gap: 14px; min-width: 0; min-height: 0; overflow: hidden; }
  .icon-wrap { width: 48px; height: 48px; border-radius: 50%; background: color-mix(in oklab, var(--secondary) 80%, #fff); display: grid; place-items: center; flex: 0 0 auto; }
  .icon-wrap svg { width: 24px; height: 24px; stroke: var(--primary); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .card h3 { font-family: var(--font-header); font-size: 24px; font-weight: 700; color: var(--primary); margin: 0; line-height: 1.3; }
  .card p { font-size: 16px; color: var(--text); margin: 0; line-height: 1.6; }
  .card .stat { font-family: var(--font-header); font-size: 64px; font-weight: 900; color: var(--primary); line-height: 1; margin: 8px 0 4px; }
  .card .stat-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="slide">
    <h1 class="slide-title">頁面標題</h1>
    <p class="slide-subtitle">頁面副標題</p>
    <main class="bento">
      <article class="card">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </div>
        <h3>左側卡片標題</h3>
        <p>具體內容說明,包含數字、名稱或具體動詞。</p>
      </article>
      <article class="card">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h3>右側卡片標題</h3>
        <p>具體內容說明,包含數字、名稱或具體動詞。</p>
      </article>
    </main>
  </div>
</body>
</html>
