<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Bento 3-column</title>
<style>
  :root {
    --primary: #1E2761; --secondary: #CADCFC; --accent: #FFFFFF;
    --bg: #F7F9FC; --text: #1A1A2E; --text-muted: #5A5A72;
    --slide-w: 1280px; --slide-h: 720px; --pad: 48px; --gap: 20px; --card-radius: 16px;
    --font-header: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
    --font-body:   "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { width: var(--slide-w); height: var(--slide-h); background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
  .slide { width: 100%; height: 100%; padding: var(--pad); display: flex; flex-direction: column; }
  .slide-title { font-family: var(--font-header); font-size: 40px; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.2; }
  .slide-subtitle { font-size: 18px; color: var(--text-muted); margin: 8px 0 32px; line-height: 1.4; }
  .bento { flex: 1; display: grid; gap: var(--gap); grid-template-columns: 1fr 1fr 1fr; min-height: 0; }
  .card { background: #fff; border-radius: var(--card-radius); padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); display: flex; flex-direction: column; gap: 12px; min-width: 0; min-height: 0; overflow: hidden; }
  .step-num { font-family: var(--font-header); font-size: 14px; font-weight: 800; color: var(--primary); letter-spacing: 0.12em; }
  .icon-wrap { width: 44px; height: 44px; border-radius: 50%; background: color-mix(in oklab, var(--secondary) 80%, #fff); display: grid; place-items: center; flex: 0 0 auto; }
  .icon-wrap svg { width: 22px; height: 22px; stroke: var(--primary); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .card h3 { font-family: var(--font-header); font-size: 22px; font-weight: 700; color: var(--primary); margin: 0; line-height: 1.3; }
  .card p { font-size: 15px; color: var(--text); margin: 0; line-height: 1.55; }
</style>
</head>
<body>
  <div class="slide">
    <h1 class="slide-title">頁面標題</h1>
    <p class="slide-subtitle">頁面副標題</p>
    <main class="bento">
      <article class="card">
        <span class="step-num">01</span>
        <div class="icon-wrap"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="10"/></svg></div>
        <h3>支柱一</h3>
        <p>具體說明。</p>
      </article>
      <article class="card">
        <span class="step-num">02</span>
        <div class="icon-wrap"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <h3>支柱二</h3>
        <p>具體說明。</p>
      </article>
      <article class="card">
        <span class="step-num">03</span>
        <div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg></div>
        <h3>支柱三</h3>
        <p>具體說明。</p>
      </article>
    </main>
  </div>
</body>
</html>
