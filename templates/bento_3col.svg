<?xml version="1.0" encoding="UTF-8"?>
<!--
  bento_3col.svg — three-column Bento Grid (1280×720).
  Header y=48..120; cards y=140..672. Inner width 1184, gap 20.
  Card width = (1184 - 2*20) / 3 = 381; x positions: 48, 449, 850.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F7F9FC"/>

  <text x="48" y="92"  font-size="40" font-weight="800" fill="#1E2761">三個並列要點</text>
  <text x="48" y="124" font-size="18" fill="#5A5A72">同層級三項比較</text>

  <!-- Card 1 -->
  <rect x="48"  y="140" width="381" height="532" rx="16" ry="16"
        fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="104" cy="196" r="24" fill="#CADCFC"/>
  <text x="80" y="280" font-size="22" font-weight="700" fill="#1E2761">第一點</text>
  <text x="80" y="320" font-size="16" fill="#1A1A2E">
    <tspan x="80" dy="0">說明文字第一行。</tspan>
    <tspan x="80" dy="1.55em">第二行繼續。</tspan>
  </text>

  <!-- Card 2 -->
  <rect x="449" y="140" width="381" height="532" rx="16" ry="16"
        fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="505" cy="196" r="24" fill="#CADCFC"/>
  <text x="481" y="280" font-size="22" font-weight="700" fill="#1E2761">第二點</text>
  <text x="481" y="320" font-size="16" fill="#1A1A2E">
    <tspan x="481" dy="0">說明文字第一行。</tspan>
    <tspan x="481" dy="1.55em">第二行繼續。</tspan>
  </text>

  <!-- Card 3 -->
  <rect x="850" y="140" width="381" height="532" rx="16" ry="16"
        fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="906" cy="196" r="24" fill="#CADCFC"/>
  <text x="882" y="280" font-size="22" font-weight="700" fill="#1E2761">第三點</text>
  <text x="882" y="320" font-size="16" fill="#1A1A2E">
    <tspan x="882" dy="0">說明文字第一行。</tspan>
    <tspan x="882" dy="1.55em">第二行繼續。</tspan>
  </text>
</svg>
