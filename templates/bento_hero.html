<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Bento Hero-top</title>
<style>
  :root {
    --primary: #1E2761; --secondary: #CADCFC; --accent: #FFFFFF;
    --bg: #F7F9FC; --text: #1A1A2E; --text-muted: #5A5A72;
    --slide-w: 1280px; --slide-h: 720px; --pad: 48px; --gap: 20px; --card-radius: 16px;
    --font-header: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
    --font-body:   "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { width: var(--slide-w); height: var(--slide-h); background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
  .slide { width: 100%; height: 100%; padding: var(--pad); display: flex; flex-direction: column; }
  .slide-title { font-family: var(--font-header); font-size: 36px; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.2; }
  .slide-subtitle { font-size: 16px; color: var(--text-muted); margin: 6px 0 24px; line-height: 1.4; }
  .bento { flex: 1; display: grid; gap: var(--gap); grid-template-columns: repeat(3, 1fr); grid-template-rows: 1.4fr 1fr; min-height: 0; }
  .card { background: #fff; border-radius: var(--card-radius); padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); display: flex; flex-direction: column; gap: 12px; min-width: 0; min-height: 0; overflow: hidden; }
  .card.hero { grid-column: 1 / -1; background: var(--primary); color: #fff; padding: 36px 40px; flex-direction: row; align-items: center; gap: 28px; }
  .card.hero h3 { font-family: var(--font-header); font-size: 32px; font-weight: 800; margin: 0 0 8px; line-height: 1.2; }
  .card.hero p { font-size: 17px; line-height: 1.55; margin: 0; opacity: 0.9; }
  .card.hero .hero-stat { font-family: var(--font-header); font-size: 84px; font-weight: 900; line-height: 1; min-width: 220px; }
  .card.hero .hero-stat span { font-size: 24px; opacity: 0.7; margin-left: 4px; }
  .icon-wrap { width: 40px; height: 40px; border-radius: 50%; background: color-mix(in oklab, var(--secondary) 80%, #fff); display: grid; place-items: center; flex: 0 0 auto; }
  .icon-wrap svg { width: 20px; height: 20px; stroke: var(--primary); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .card h3 { font-family: var(--font-header); font-size: 18px; font-weight: 700; color: var(--primary); margin: 0; line-height: 1.3; }
  .card p { font-size: 13px; color: var(--text); margin: 0; line-height: 1.5; }
</style>
</head>
<body>
  <div class="slide">
    <h1 class="slide-title">頁面標題</h1>
    <p class="slide-subtitle">頁面副標題</p>
    <main class="bento">
      <article class="card hero">
        <div class="hero-stat">42<span>%</span></div>
        <div>
          <h3>主要亮點標題</h3>
          <p>用一句具有衝擊力的話描述為何這個數字重要。</p>
        </div>
      </article>
      <article class="card">
        <div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><polyline points="7 14 11 10 15 14 21 8"/></svg></div>
        <h3>支撐點 1</h3>
        <p>說明文字。</p>
      </article>
      <article class="card">
        <div class="icon-wrap"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg></div>
        <h3>支撐點 2</h3>
        <p>說明文字。</p>
      </article>
      <article class="card">
        <div class="icon-wrap"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <h3>支撐點 3</h3>
        <p>說明文字。</p>
      </article>
    </main>
  </div>
</body>
</html>
