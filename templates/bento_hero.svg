<?xml version="1.0" encoding="UTF-8"?>
<!--
  bento_hero.svg — hero card + 4 supporting cards (1280×720).
  Header y=48..120. Hero: y=140, h=240. Support row: y=400, h=272.
  Inner width 1184, support card width = (1184 - 3*20)/4 = 281; x: 48, 349, 650, 951.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F7F9FC"/>

  <text x="48" y="92"  font-size="40" font-weight="800" fill="#1E2761">主要主張 + 四個支撐點</text>
  <text x="48" y="124" font-size="18" fill="#5A5A72">Hero card 一個 claim,下排四張卡片各提一項證據</text>

  <!-- Hero card -->
  <rect x="48" y="140" width="1184" height="240" rx="16" ry="16"
        fill="#1E2761" filter="url(#cardShadow)"/>
  <text x="88" y="220" font-size="32" font-weight="800" fill="#FFFFFF">這是 Hero 卡片的核心主張</text>
  <text x="88" y="270" font-size="18" fill="#CADCFC">
    <tspan x="88" dy="0">用一句話把整頁的結論講完。</tspan>
    <tspan x="88" dy="1.55em">下排卡片用來提供證據與細節。</tspan>
  </text>

  <!-- 4 support cards -->
  <g>
    <rect x="48"  y="400" width="281" height="272" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="76" y="452" font-size="44" font-weight="900" fill="#1E2761">01</text>
    <text x="76" y="500" font-size="18" font-weight="700" fill="#1E2761">支撐點一</text>
    <text x="76" y="528" font-size="16" fill="#5A5A72">說明文字。</text>
  </g>
  <g>
    <rect x="349" y="400" width="281" height="272" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="377" y="452" font-size="44" font-weight="900" fill="#1E2761">02</text>
    <text x="377" y="500" font-size="18" font-weight="700" fill="#1E2761">支撐點二</text>
    <text x="377" y="528" font-size="16" fill="#5A5A72">說明文字。</text>
  </g>
  <g>
    <rect x="650" y="400" width="281" height="272" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="678" y="452" font-size="44" font-weight="900" fill="#1E2761">03</text>
    <text x="678" y="500" font-size="18" font-weight="700" fill="#1E2761">支撐點三</text>
    <text x="678" y="528" font-size="16" fill="#5A5A72">說明文字。</text>
  </g>
  <g>
    <rect x="951" y="400" width="281" height="272" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="979" y="452" font-size="44" font-weight="900" fill="#1E2761">04</text>
    <text x="979" y="500" font-size="18" font-weight="700" fill="#1E2761">支撐點四</text>
    <text x="979" y="528" font-size="16" fill="#5A5A72">說明文字。</text>
  </g>
</svg>
