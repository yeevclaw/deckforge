<?xml version="1.0" encoding="UTF-8"?>
<!--
  bento_mini_grid.svg — main card with a row of 4 mini-cards (1280×720).
  dark_apple palette assumed. Replace #FF6900 with the resolved highlight color.

  Geometry:
    Header band:   y=48..120 (title 52px, EN subtitle 16px)
    Main card:     x=48, y=140, w=1184, h=532, rx=20, fill=#1A1A1A
    Mini cards:    4 cards inside the main card
                    each w=257, h=360, gap=24, x: 88, 369, 650, 931
                    y=226 (vertically centered: main card 140+(532-360)/2=226)
    Use big number 80–96px or short text title 32–40px inside each mini-card.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">

  <!-- Pure black page background -->
  <rect width="1280" height="720" fill="#000000"/>

  <!-- Page title (CN big + EN small) -->
  <text x="48" y="86" font-size="44" font-weight="800" fill="#FFFFFF">關鍵指標,一目了然</text>
  <text x="48" y="114" font-size="16" font-weight="500" fill="#A0A0A0" letter-spacing="1">
    Key Performance Indicators
  </text>

  <!-- Main card: dark gray, 1px border -->
  <rect x="48" y="140" width="1184" height="532" rx="20" ry="20"
        fill="#1A1A1A" stroke="#333333" stroke-width="1"/>

  <!-- Mini card 1 — number-first -->
  <rect x="88" y="226" width="257" height="360" rx="12" ry="12"
        fill="#222222" stroke="#333333" stroke-width="1"/>
  <text x="216" y="350" font-size="64" font-weight="900" fill="#FF6900" text-anchor="middle">42%</text>
  <text x="216" y="410" font-size="16" fill="#FFFFFF" text-anchor="middle">營收同比增長</text>
  <text x="216" y="435" font-size="11" fill="#666666" text-anchor="middle" letter-spacing="1">YoY Revenue Growth</text>

  <!-- Mini card 2 — number-first -->
  <rect x="369" y="226" width="257" height="360" rx="12" ry="12"
        fill="#222222" stroke="#333333" stroke-width="1"/>
  <text x="497" y="350" font-size="64" font-weight="900" fill="#FF6900" text-anchor="middle">15M</text>
  <text x="497" y="410" font-size="16" fill="#FFFFFF" text-anchor="middle">月活用戶</text>
  <text x="497" y="435" font-size="11" fill="#666666" text-anchor="middle" letter-spacing="1">Monthly Active Users</text>

  <!-- Mini card 3 — text-title -->
  <rect x="650" y="226" width="257" height="360" rx="12" ry="12"
        fill="#222222" stroke="#333333" stroke-width="1"/>
  <text x="778" y="360" font-size="36" font-weight="800" fill="#FFFFFF" text-anchor="middle">行業第一</text>
  <text x="778" y="410" font-size="16" fill="#A0A0A0" text-anchor="middle">細分市場排名</text>
  <text x="778" y="435" font-size="11" fill="#666666" text-anchor="middle" letter-spacing="1">#1 in Category</text>

  <!-- Mini card 4 — number-first -->
  <rect x="931" y="226" width="257" height="360" rx="12" ry="12"
        fill="#222222" stroke="#333333" stroke-width="1"/>
  <text x="1059" y="350" font-size="64" font-weight="900" fill="#FF6900" text-anchor="middle">3.2億</text>
  <text x="1059" y="410" font-size="16" fill="#FFFFFF" text-anchor="middle">年度淨利潤</text>
  <text x="1059" y="435" font-size="11" fill="#666666" text-anchor="middle" letter-spacing="1">Annual Net Profit</text>
</svg>
