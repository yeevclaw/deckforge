<?xml version="1.0" encoding="UTF-8"?>
<!--
  bento_mixed.svg — asymmetric mixed grid (1280×720). One big card on the left,
  two medium cards stacked on the top-right, one wide card on the bottom-right.
  Header y=48..120. Bento area y=140..672 (h=532).
  Big card: x=48,  y=140, w=582, h=532
  Med top:  x=650, y=140, w=582, h=256
  Med wide: x=650, y=416, w=582, h=256
  (Bottom-right could also be split into 2 small cards; tweak as needed.)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F7F9FC"/>

  <text x="48" y="92"  font-size="40" font-weight="800" fill="#1E2761">混合網格,以內容決定版面</text>
  <text x="48" y="124" font-size="18" fill="#5A5A72">主要 + 補充 + 註腳</text>

  <!-- Big card (left) -->
  <rect x="48" y="140" width="582" height="532" rx="16" ry="16"
        fill="#1E2761" filter="url(#cardShadow)"/>
  <text x="88" y="220" font-size="28" font-weight="800" fill="#FFFFFF">主要主張</text>
  <text x="88" y="270" font-size="16" fill="#CADCFC">
    <tspan x="88" dy="0">用一張大卡片承載最重要的訊息。</tspan>
    <tspan x="88" dy="1.55em">尺寸 = 重要性。</tspan>
  </text>
  <text x="88" y="540" font-size="80" font-weight="900" fill="#FFFFFF">88%</text>
  <text x="88" y="580" font-size="14" fill="#CADCFC" letter-spacing="2">關鍵指標</text>

  <!-- Med top-right -->
  <rect x="650" y="140" width="582" height="256" rx="16" ry="16"
        fill="#FFFFFF" filter="url(#cardShadow)"/>
  <text x="682" y="200" font-size="22" font-weight="700" fill="#1E2761">補充資料</text>
  <text x="682" y="240" font-size="16" fill="#1A1A2E">
    <tspan x="682" dy="0">第一行。</tspan>
    <tspan x="682" dy="1.55em">第二行。</tspan>
  </text>

  <!-- Med bottom-right -->
  <rect x="650" y="416" width="582" height="256" rx="16" ry="16"
        fill="#FFFFFF" filter="url(#cardShadow)"/>
  <text x="682" y="476" font-size="22" font-weight="700" fill="#1E2761">補充註腳</text>
  <text x="682" y="516" font-size="16" fill="#1A1A2E">
    <tspan x="682" dy="0">第一行。</tspan>
    <tspan x="682" dy="1.55em">第二行。</tspan>
  </text>
</svg>
