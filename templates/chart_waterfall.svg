<?xml version="1.0" encoding="UTF-8"?>
<!--
  chart_waterfall.svg — A→B bridge with level connectors + diff bracket (1280×720, dark_apple).
  Replace #FF6900 with the deck's highlight color.
  Items: 2023營收 180 (total) · 智慧家居 +55 · 訂閱服務 +70 · 海外市場 +30 · 配件調整 −25 · 2025營收 310 (total).
  Running levels: 180 → 235 → 305 → 335 (peak) → 310. Scale 1.15px/unit, baseline y=400.
  6 bars w=110 at x=0/178/356/534/712/890, inside translate(152, 200).
  Colors: totals #3A3A3C · increases = highlight · decreases #6E6E73 (neutral gray, NEVER red).
  Emphasis follows the title's claim: the two claim-bearing drivers (訂閱服務+海外市場) stay full hue,
  the background driver (智慧家居) drops to 0.45. Two annotations: a grouping bracket over the claim
  bars stating the title's number (+100 · 佔增長77%, the one hue-colored label), and the start→end
  +72% bracket at the right edge in ink.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">

  <rect width="1280" height="720" fill="#000000"/>

  <!-- Page title -->
  <text x="48" y="86" font-size="44" font-weight="800" fill="#FFFFFF">訂閱服務與海外市場貢獻近八成營收增長</text>
  <text x="48" y="114" font-size="16" font-weight="500" fill="#A0A0A0" letter-spacing="1">
    Services &amp; Overseas Drive Nearly 80% of Revenue Growth
  </text>

  <!-- Plot area -->
  <g transform="translate(152, 200)">
    <!-- Unit tag -->
    <text x="0" y="-6" font-size="12" fill="#A0A0A0">單位:NT$億</text>

    <!-- Baseline -->
    <line x1="0" y1="400" x2="1000" y2="400" stroke="#333333" stroke-width="1"/>

    <!-- Start total -->
    <rect x="0" y="193" width="110" height="207" fill="#3A3A3C"/>
    <!-- Increases (float from previous level); the claim-bearing drivers stay full hue,
         the background driver is muted to 0.45 -->
    <rect x="178" y="130" width="110" height="63" fill="#FF6900" fill-opacity="0.45"/>
    <rect x="356" y="49"  width="110" height="81" fill="#FF6900"/>
    <rect x="534" y="15"  width="110" height="34" fill="#FF6900"/>
    <!-- Decrease (neutral gray) -->
    <rect x="712" y="15"  width="110" height="29" fill="#6E6E73"/>
    <!-- End total -->
    <rect x="890" y="44"  width="110" height="356" fill="#3A3A3C"/>

    <!-- Level connectors (dashed, ink voice) -->
    <line x1="110" y1="193" x2="178" y2="193" stroke="#555555" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="288" y1="130" x2="356" y2="130" stroke="#555555" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="466" y1="49"  x2="534" y2="49"  stroke="#555555" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="644" y1="15"  x2="712" y2="15"  stroke="#555555" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="822" y1="44"  x2="890" y2="44"  stroke="#555555" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- Value labels: totals in ink bold, deltas signed in their bar's color -->
    <text x="55"  y="181" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" style="font-variant-numeric: tabular-nums">180</text>
    <text x="233" y="118" font-size="15" font-weight="700" fill="#9A9AA0" text-anchor="middle" style="font-variant-numeric: tabular-nums">+55</text>
    <text x="411" y="37"  font-size="15" font-weight="700" fill="#FF6900" text-anchor="middle" style="font-variant-numeric: tabular-nums">+70</text>
    <text x="589" y="3"   font-size="15" font-weight="700" fill="#FF6900" text-anchor="middle" style="font-variant-numeric: tabular-nums">+30</text>
    <text x="767" y="3"   font-size="15" font-weight="700" fill="#9A9AA0" text-anchor="middle" style="font-variant-numeric: tabular-nums">−25</text>
    <text x="945" y="32"  font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" style="font-variant-numeric: tabular-nums">310</text>

    <!-- Annotation 1 — grouping bracket over the claim-bearing bars, stating the title's
         number (the one hue-colored label on this chart) -->
    <line x1="356" y1="-14" x2="644" y2="-14" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="356" y1="-14" x2="356" y2="-8"  stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="644" y1="-14" x2="644" y2="-8"  stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="500" y="-26" font-size="15" font-weight="700" fill="#FF6900" text-anchor="middle">+100 · 佔增長77%</text>

    <!-- Annotation 2 — diff_arrow bracket: start-total top ↔ end-total top (ink label) -->
    <line x1="1008" y1="44"  x2="1008" y2="193" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="1000" y1="44"  x2="1016" y2="44"  stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="1000" y1="193" x2="1016" y2="193" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="1020" y="123" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="start">+72%</text>

    <!-- Category labels -->
    <text x="55"  y="430" font-size="13" fill="#FFFFFF" text-anchor="middle">2023營收</text>
    <text x="233" y="430" font-size="13" fill="#FFFFFF" text-anchor="middle">智慧家居</text>
    <text x="411" y="430" font-size="13" fill="#FFFFFF" text-anchor="middle">訂閱服務</text>
    <text x="589" y="430" font-size="13" fill="#FFFFFF" text-anchor="middle">海外市場</text>
    <text x="767" y="430" font-size="13" fill="#FFFFFF" text-anchor="middle">配件調整</text>
    <text x="945" y="430" font-size="13" fill="#FFFFFF" text-anchor="middle">2025營收</text>

    <!-- EN sub-labels -->
    <text x="55"  y="452" font-size="10" fill="#666666" text-anchor="middle" letter-spacing="1">FY2023</text>
    <text x="233" y="452" font-size="10" fill="#666666" text-anchor="middle" letter-spacing="1">SMART HOME</text>
    <text x="411" y="452" font-size="10" fill="#666666" text-anchor="middle" letter-spacing="1">SERVICES</text>
    <text x="589" y="452" font-size="10" fill="#666666" text-anchor="middle" letter-spacing="1">OVERSEAS</text>
    <text x="767" y="452" font-size="10" fill="#666666" text-anchor="middle" letter-spacing="1">ACCESSORIES</text>
    <text x="945" y="452" font-size="10" fill="#666666" text-anchor="middle" letter-spacing="1">FY2025</text>
  </g>

  <!-- Footer page number -->
  <text x="1200" y="710" font-size="12" fill="#666666" text-anchor="end">N / N</text>
</svg>
