<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Cover</title>
<style>
  :root {
    --primary: #1E2761;
    --secondary: #CADCFC;
    --accent: #FFFFFF;
    --bg: #1E2761;
    --text-on-dark: #FFFFFF;
    --text-muted-on-dark: rgba(255,255,255,0.7);
    --slide-w: 1280px; --slide-h: 720px; --pad: 80px;
    --font-header: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, -apple-system, sans-serif;
    --font-body:   "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: var(--slide-w); height: var(--slide-h);
    background:
      radial-gradient(circle at 18% 22%, color-mix(in oklab, var(--secondary) 18%, transparent), transparent 55%),
      radial-gradient(circle at 88% 82%, color-mix(in oklab, var(--accent) 10%, transparent), transparent 55%),
      var(--bg);
    color: var(--text-on-dark);
    font-family: var(--font-body);
    overflow: hidden;
  }
  .cover {
    width: 100%; height: 100%;
    padding: var(--pad);
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
  }
  .eyebrow {
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--secondary);
    margin: 0 0 24px;
  }
  .cover h1 {
    font-family: var(--font-header);
    font-size: 96px;
    font-weight: 900;
    line-height: 1.05;
    margin: 0;
    max-width: 1000px;
    letter-spacing: -0.02em;
  }
  .cover .subtitle {
    font-size: 26px;
    color: var(--text-muted-on-dark);
    margin: 28px 0 0;
    line-height: 1.4;
    max-width: 800px;
  }
  .cover .meta {
    position: absolute;
    bottom: var(--pad);
    left: var(--pad);
    right: var(--pad);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    color: var(--text-muted-on-dark);
    font-size: 14px;
  }
  .accent-shape {
    position: absolute;
    right: -160px; top: -160px;
    width: 540px; height: 540px;
    border-radius: 50%;
    background: color-mix(in oklab, var(--secondary) 18%, transparent);
    filter: blur(40px);
  }
</style>
</head>
<body>
  <div class="accent-shape"></div>
  <div class="cover">
    <p class="eyebrow">{{eyebrow}}</p>
    <h1>{{title}}</h1>
    <p class="subtitle">{{subtitle}}</p>
    <div class="meta">
      <span>{{author}}</span>
      <span>{{date}}</span>
    </div>
  </div>
</body>
</html>
