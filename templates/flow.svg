<?xml version="1.0" encoding="UTF-8"?>
<!--
  flow.svg — horizontal 4-step flow on dark_apple style (1280×720).
  Replace #FF6900 with the deck's highlight color.
  Each node: 240w × 180h. Gap between nodes: 48. Vertical center: y=370 (node y=280..460).
  Arrow gutter: 4px each side of the gap → arrow x1 = node_right + 4, x2 = next_node_left - 4.
  Last node highlighted by default (border in highlight color, labels in highlight color).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', Inter, system-ui, sans-serif">

  <rect width="1280" height="720" fill="#000000"/>

  <!-- Page title -->
  <text x="48" y="86" font-size="44" font-weight="800" fill="#FFFFFF">從訊號到決策的四步流程</text>
  <text x="48" y="114" font-size="16" font-weight="500" fill="#A0A0A0" letter-spacing="1">
    From Signal to Decision in 4 Steps
  </text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#666666"/>
    </marker>
    <marker id="flowArrowHighlight" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FF6900"/>
    </marker>
  </defs>

  <!-- Node 1: COLLECT -->
  <g transform="translate(88, 280)">
    <rect width="240" height="180" rx="16" fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
    <text x="120" y="42" font-size="11" font-weight="500" fill="#666666" letter-spacing="2" text-anchor="middle">01 · COLLECT</text>
    <text x="120" y="92" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle">訊號收集</text>
    <text x="120" y="130" font-size="13" font-weight="400" fill="#A0A0A0" text-anchor="middle">從多源捕捉</text>
    <text x="120" y="150" font-size="13" font-weight="400" fill="#A0A0A0" text-anchor="middle">原始訊號</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="332" y1="370" x2="372" y2="370" stroke="#666666" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Node 2: AGGREGATE -->
  <g transform="translate(376, 280)">
    <rect width="240" height="180" rx="16" fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
    <text x="120" y="42" font-size="11" font-weight="500" fill="#666666" letter-spacing="2" text-anchor="middle">02 · AGGREGATE</text>
    <text x="120" y="92" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle">聚合分析</text>
    <text x="120" y="130" font-size="13" font-weight="400" fill="#A0A0A0" text-anchor="middle">降噪後形成</text>
    <text x="120" y="150" font-size="13" font-weight="400" fill="#A0A0A0" text-anchor="middle">假設</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="620" y1="370" x2="660" y2="370" stroke="#666666" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Node 3: VALIDATE -->
  <g transform="translate(664, 280)">
    <rect width="240" height="180" rx="16" fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
    <text x="120" y="42" font-size="11" font-weight="500" fill="#666666" letter-spacing="2" text-anchor="middle">03 · VALIDATE</text>
    <text x="120" y="92" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle">假設驗證</text>
    <text x="120" y="130" font-size="13" font-weight="400" fill="#A0A0A0" text-anchor="middle">資料對齊</text>
    <text x="120" y="150" font-size="13" font-weight="400" fill="#A0A0A0" text-anchor="middle">歷史模式</text>
  </g>

  <!-- Arrow 3→4 (highlighted, leads to final node) -->
  <line x1="908" y1="370" x2="948" y2="370" stroke="#FF6900" stroke-width="2" marker-end="url(#flowArrowHighlight)"/>

  <!-- Node 4: ACT — highlighted final node -->
  <g transform="translate(952, 280)">
    <rect width="240" height="180" rx="16" fill="#1A1A1A" stroke="#FF6900" stroke-width="2"/>
    <text x="120" y="42" font-size="11" font-weight="500" fill="#FF6900" letter-spacing="2" text-anchor="middle">04 · ACT</text>
    <text x="120" y="92" font-size="28" font-weight="800" fill="#FF6900" text-anchor="middle">決策行動</text>
    <text x="120" y="130" font-size="13" font-weight="400" fill="#A0A0A0" text-anchor="middle">輸出可執行</text>
    <text x="120" y="150" font-size="13" font-weight="400" fill="#A0A0A0" text-anchor="middle">決策</text>
  </g>

  <!-- Footer page number -->
  <text x="1200" y="710" font-size="12" fill="#666666" text-anchor="end">N / N</text>
</svg>
