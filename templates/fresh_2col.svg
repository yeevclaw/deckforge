<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <!-- card_variant: balanced (two_col_50_50 default) — two co-equal parallel ideas /
       options / pros-vs-cons, each a white card with icon + title + body. The plain
       two-up. For a DRAMATIC two-sided contrast (each panel styled as the thing it
       depicts) use split_style_duel instead; for a transformation use before_after. -->
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washLav" cx="92%" cy="4%" r="48%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="52%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2A4A3A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="106" font-size="45" font-weight="800" fill="#383838">兩條路徑，各有取捨</text>

  <!-- card A -->
  <rect x="48" y="180" width="568" height="460" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g transform="translate(104 228)">
    <g transform="scale(4.5)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" fill="#D8E4FB"/>
      <circle cx="12" cy="12" r="6" fill="#FFFFFF"/>
      <circle cx="12" cy="12" r="2" fill="#5E8FEF"/>
    </g>
  </g>
  <text x="104" y="412" font-size="14" font-weight="700" fill="#8A9199" letter-spacing="2">OPTION A · 本地優先</text>
  <text x="104" y="452" font-size="28" font-weight="700" fill="#383838">自建機房，完全掌控</text>
  <text x="104" y="500" font-size="19" fill="#4A5158">
    <tspan x="104" dy="0">資料不出場、合規最穩，</tspan>
    <tspan x="104" dy="34">但<tspan fill="#E8872E" font-weight="700">前期投入高</tspan>、擴張慢。</tspan>
  </text>

  <!-- card B -->
  <rect x="664" y="180" width="568" height="460" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g transform="translate(720 228)">
    <g transform="scale(4.5)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" fill="#D8E4FB"/>
      <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" fill="#FFFFFF"/>
    </g>
  </g>
  <text x="720" y="412" font-size="14" font-weight="700" fill="#8A9199" letter-spacing="2">OPTION B · 雲端優先</text>
  <text x="720" y="452" font-size="28" font-weight="700" fill="#383838">託管上雲，彈性擴張</text>
  <text x="720" y="500" font-size="19" fill="#4A5158">
    <tspan x="720" dy="0">隨用隨開、上線最快，</tspan>
    <tspan x="720" dy="34">但須<tspan fill="#E8872E" font-weight="700">嚴管權限</tspan>與成本。</tspan>
  </text>
</svg>
