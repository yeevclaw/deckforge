<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <!-- card_variant: before_after (two_col_50_50) — a transformation: current state → new
       state, with a directional arrow between. The "after" card carries the green eyebrow
       and the orange payoff. Use for migrations / process改造; for two co-equal options use
       balanced, for a dramatic style contrast use split_style_duel. -->
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washLav" cx="92%" cy="4%" r="48%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="52%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2A4A3A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="106" font-size="45" font-weight="800" fill="#383838">從人工到自動，一步到位</text>

  <!-- BEFORE card -->
  <rect x="48" y="190" width="540" height="440" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g transform="translate(100 230)">
    <g transform="scale(3.5)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="#D8E4FB"/>
      <polyline points="14 2 14 8 20 8" fill="#FFFFFF"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
    </g>
  </g>
  <text x="100" y="392" font-size="14" font-weight="700" fill="#8A9199" letter-spacing="2">BEFORE · 現況</text>
  <text x="100" y="434" font-size="28" font-weight="700" fill="#383838">人工逐筆對帳</text>
  <text x="100" y="480" font-size="19" fill="#4A5158">
    <tspan x="100" dy="0">每月耗時三天，</tspan>
    <tspan x="100" dy="34">易出錯、難追溯。</tspan>
  </text>

  <!-- transition arrow -->
  <circle cx="640" cy="410" r="30" fill="#4EC487"/>
  <path d="M627 410 h20 M642 399 l11 11 -11 11" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AFTER card -->
  <rect x="692" y="190" width="540" height="440" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g transform="translate(744 230)">
    <g transform="scale(3.5)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" fill="#D8E4FB"/>
      <polyline points="22 4 12 14.01 9 11.01" fill="none"/>
    </g>
  </g>
  <text x="744" y="392" font-size="14" font-weight="700" fill="#1B8A82" letter-spacing="2">AFTER · 自動化</text>
  <text x="744" y="434" font-size="28" font-weight="700" fill="#383838">系統即時勾稽</text>
  <text x="744" y="480" font-size="19" fill="#4A5158">
    <tspan x="744" dy="0"><tspan fill="#E8872E" font-weight="700">分鐘級完成</tspan>，</tspan>
    <tspan x="744" dy="34">全程留痕、可回溯。</tspan>
  </text>
</svg>
