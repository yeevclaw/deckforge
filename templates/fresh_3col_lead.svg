<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <!-- card_variant: lead_plus_pair — three parallel items where ONE clearly leads and two
       support it. A 60% hero card carries the lead claim; two stacked cards hold the
       supports. Same white-card language as the family; only the macro split differs. -->
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washLav" cx="92%" cy="4%" r="48%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="52%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2A4A3A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="106" font-size="45" font-weight="800" fill="#383838">一個主軸，兩項支撐</text>

  <!-- lead card (≈60%) -->
  <rect x="48" y="168" width="700" height="474" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g transform="translate(104 214)">
    <g transform="scale(4.5)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" fill="#D8E4FB"/>
      <circle cx="9" cy="7" r="4" fill="#D8E4FB"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" fill="none"/>
    </g>
  </g>
  <text x="100" y="392" font-size="32" font-weight="700" fill="#383838">
    <tspan x="100" dy="0">你的專業與判斷，</tspan>
    <tspan x="100" dy="44">始終是協作的地基。</tspan>
  </text>
  <text x="100" y="500" font-size="19" fill="#4A5158">
    <tspan x="100" dy="0">AI 再強，也只是放大你的判斷；</tspan>
    <tspan x="100" dy="34"><tspan fill="#E8872E" font-weight="700">專業仍在你這一端</tspan>，由你決定</tspan>
    <tspan x="100" dy="34">什麼可信、什麼該改、什麼該退回。</tspan>
  </text>

  <!-- support card A -->
  <rect x="772" y="168" width="460" height="226" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g transform="translate(802 198)">
    <g transform="scale(2.4)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" fill="#D8E4FB"/>
      <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" fill="#FFFFFF"/>
    </g>
  </g>
  <text x="874" y="240" font-size="22" font-weight="700" fill="#383838">效果穩定、可複製</text>
  <text x="802" y="302" font-size="18" fill="#4A5158">
    <tspan x="802" dy="0">有意識地與 AI 協作，</tspan>
    <tspan x="802" dy="30">結果不再只是<tspan fill="#E8872E" font-weight="700">碰運氣</tspan>。</tspan>
  </text>

  <!-- support card B -->
  <rect x="772" y="416" width="460" height="226" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g transform="translate(802 446)">
    <g transform="scale(2.4)" stroke="#5E8FEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="#D8E4FB"/>
      <polyline points="14 2 14 8 20 8" fill="#FFFFFF"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
    </g>
  </g>
  <text x="874" y="488" font-size="22" font-weight="700" fill="#383838">跨工具、不過時</text>
  <text x="802" y="550" font-size="18" fill="#4A5158">
    <tspan x="802" dy="0">原則綁在判斷上，</tspan>
    <tspan x="802" dy="30">換了模型一樣<tspan fill="#E8872E" font-weight="700">通用</tspan>。</tspan>
  </text>
</svg>
