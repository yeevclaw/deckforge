<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <!-- two-layer glass mesas: outer halo + inner body, bleeding off the bottom -->
    <linearGradient id="mesaHalo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A6CDD4" stop-opacity="0.50"/>
      <stop offset="60%" stop-color="#BCD9D6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C8DED8" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="mesaBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A6CDD4" stop-opacity="0.62"/>
      <stop offset="60%" stop-color="#BCD9D6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#C8DED8" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="mesaHaloEnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A1E5DE" stop-opacity="0.50"/>
      <stop offset="60%" stop-color="#B6E8D8" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#C5EDD8" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="mesaBodyEnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A1E5DE" stop-opacity="0.62"/>
      <stop offset="60%" stop-color="#B6E8D8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#C5EDD8" stop-opacity="0.12"/>
    </linearGradient>
    <!-- low horizon swoosh, rising left to right behind the mesas -->
    <linearGradient id="swooshGrad" x1="90" y1="0" x2="1232" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CDEBD9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A8DFC2" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="52%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="102" font-size="34" font-weight="700" fill="#383838">流程頁標題：四個階段把能力逐步墊高到位</text>

  <!-- low horizon swoosh: ONE continuous filled path (tail flick → rising wedge →
       integrated arrowhead), drawn BEFORE the mesas so it weaves behind the skyline
       and only the arrowhead emerges past the final mesa -->
  <path d="M 90 612
           Q 600 560 1170 450
           L 1160 426
           L 1258 466
           L 1142 508
           L 1158 478
           Q 610 600 96 648
           Z" fill="url(#swooshGrad)"/>

  <!-- outer halos (left to right, tops rising 430 → 325) -->
  <path d="M 70 720 L 70 470 Q 70 430 110 430 L 290 430 Q 330 430 330 470 L 330 720 Z" fill="url(#mesaHalo)"/>
  <path d="M 350 720 L 350 435 Q 350 395 390 395 L 570 395 Q 610 395 610 435 L 610 720 Z" fill="url(#mesaHalo)"/>
  <path d="M 630 720 L 630 400 Q 630 360 670 360 L 850 360 Q 890 360 890 400 L 890 720 Z" fill="url(#mesaHalo)"/>
  <path d="M 910 720 L 910 365 Q 910 325 950 325 L 1130 325 Q 1170 325 1170 365 L 1170 720 Z" fill="url(#mesaHaloEnd)"/>

  <!-- inner bodies (inset 22, top +4) -->
  <path d="M 92 720 L 92 470 Q 92 434 128 434 L 272 434 Q 308 434 308 470 L 308 720 Z" fill="url(#mesaBody)"/>
  <path d="M 372 720 L 372 435 Q 372 399 408 399 L 552 399 Q 588 399 588 435 L 588 720 Z" fill="url(#mesaBody)"/>
  <path d="M 652 720 L 652 400 Q 652 364 688 364 L 832 364 Q 868 364 868 400 L 868 720 Z" fill="url(#mesaBody)"/>
  <path d="M 932 720 L 932 365 Q 932 329 968 329 L 1112 329 Q 1148 329 1148 365 L 1148 720 Z" fill="url(#mesaBodyEnd)"/>

  <!-- step 1 (cx 200, mesa top 430) -->
  <g>
    <text x="200" y="374" font-size="24" font-weight="700" fill="#2E6E63" text-anchor="middle">Step 1</text>
    <text x="200" y="412" font-size="30" font-weight="700" fill="#383838" text-anchor="middle">階段名稱一</text>
    <rect x="106" y="458" width="188" height="232" rx="14" fill="#FFFFFF" fill-opacity="0.88"/>
    <g transform="translate(171 482) scale(2.4)" stroke="#3F4A52" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
    </g>
    <text x="200" y="578" font-size="17" fill="#4A5158" text-anchor="middle">
      <tspan x="200" dy="0">兩行內說明這一步</tspan>
      <tspan x="200" dy="30">做什麼、為何重要</tspan>
    </text>
    <text x="200" y="658" font-size="17" font-weight="700" fill="#E8872E" text-anchor="middle">產出物一</text>
  </g>

  <!-- step 2 (cx 480, mesa top 395) -->
  <g>
    <text x="480" y="339" font-size="24" font-weight="700" fill="#2E6E63" text-anchor="middle">Step 2</text>
    <text x="480" y="377" font-size="30" font-weight="700" fill="#383838" text-anchor="middle">階段名稱二</text>
    <rect x="386" y="423" width="188" height="232" rx="14" fill="#FFFFFF" fill-opacity="0.88"/>
    <g transform="translate(451 447) scale(2.4)" stroke="#3F4A52" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      <line x1="6" y1="8" x2="9" y2="8"/><line x1="6" y1="12" x2="9" y2="12"/>
    </g>
    <text x="480" y="543" font-size="17" fill="#4A5158" text-anchor="middle">
      <tspan x="480" dy="0">兩行內說明這一步</tspan>
      <tspan x="480" dy="30">做什麼、為何重要</tspan>
    </text>
    <text x="480" y="623" font-size="17" font-weight="700" fill="#E8872E" text-anchor="middle">產出物二</text>
  </g>

  <!-- step 3 (cx 760, mesa top 360) -->
  <g>
    <text x="760" y="304" font-size="24" font-weight="700" fill="#2E6E63" text-anchor="middle">Step 3</text>
    <text x="760" y="342" font-size="30" font-weight="700" fill="#383838" text-anchor="middle">階段名稱三</text>
    <rect x="666" y="388" width="188" height="232" rx="14" fill="#FFFFFF" fill-opacity="0.88"/>
    <g transform="translate(731 412) scale(2.4)" stroke="#3F4A52" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>
    </g>
    <text x="760" y="508" font-size="17" fill="#4A5158" text-anchor="middle">
      <tspan x="760" dy="0">兩行內說明這一步</tspan>
      <tspan x="760" dy="30">做什麼、為何重要</tspan>
    </text>
    <text x="760" y="588" font-size="17" font-weight="700" fill="#E8872E" text-anchor="middle">產出物三</text>
  </g>

  <!-- step 4 (cx 1040, mesa top 325) -->
  <g>
    <text x="1040" y="269" font-size="24" font-weight="700" fill="#2E6E63" text-anchor="middle">Step 4</text>
    <text x="1040" y="307" font-size="30" font-weight="700" fill="#383838" text-anchor="middle">階段名稱四</text>
    <rect x="946" y="353" width="188" height="232" rx="14" fill="#FFFFFF" fill-opacity="0.88"/>
    <g transform="translate(1011 377) scale(2.4)" stroke="#3F4A52" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
      <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
    </g>
    <text x="1040" y="473" font-size="17" fill="#4A5158" text-anchor="middle">
      <tspan x="1040" dy="0">兩行內說明這一步</tspan>
      <tspan x="1040" dy="30">做什麼、為何重要</tspan>
    </text>
    <text x="1040" y="553" font-size="17" font-weight="700" fill="#E8872E" text-anchor="middle">產出物四</text>
  </g>
</svg>
