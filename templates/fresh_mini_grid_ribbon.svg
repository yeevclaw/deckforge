<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <!-- card_variant: ribbon_row (mini_grid) — 3–5 KPIs whose RELATIVE magnitudes matter,
       or that need a longer caption than an even tile allows. Full-width rows: number left,
       label + caption middle, a proportion bar right so the eye compares magnitudes down
       the column. Numbers teal, tabular-nums; the bar is structure green, not a 2nd accent. -->
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washLav" cx="92%" cy="4%" r="48%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="52%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2A4A3A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="106" font-size="45" font-weight="800" fill="#383838">四大區隔，量級一眼分明</text>

  <g style="font-variant-numeric: tabular-nums">
    <!-- row 1 -->
    <rect x="48" y="178" width="1184" height="108" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="96" y="247" font-size="44" font-weight="800" fill="#1B8A82">92%</text>
    <text x="300" y="228" font-size="23" font-weight="700" fill="#383838">企業客戶續約率</text>
    <text x="300" y="258" font-size="15" fill="#8A9199">Enterprise renewal</text>
    <rect x="760" y="223" width="400" height="18" rx="9" fill="#E3F1E9"/>
    <rect x="760" y="223" width="368" height="18" rx="9" fill="#4EC487"/>

    <!-- row 2 -->
    <rect x="48" y="304" width="1184" height="108" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="96" y="373" font-size="44" font-weight="800" fill="#1B8A82">74%</text>
    <text x="300" y="354" font-size="23" font-weight="700" fill="#383838">中小企業滲透率</text>
    <text x="300" y="384" font-size="15" fill="#8A9199">SMB penetration</text>
    <rect x="760" y="349" width="400" height="18" rx="9" fill="#E3F1E9"/>
    <rect x="760" y="349" width="296" height="18" rx="9" fill="#4EC487"/>

    <!-- row 3 -->
    <rect x="48" y="430" width="1184" height="108" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="96" y="499" font-size="44" font-weight="800" fill="#1B8A82">58%</text>
    <text x="300" y="480" font-size="23" font-weight="700" fill="#383838">海外營收占比</text>
    <text x="300" y="510" font-size="15" fill="#8A9199">Overseas revenue</text>
    <rect x="760" y="475" width="400" height="18" rx="9" fill="#E3F1E9"/>
    <rect x="760" y="475" width="232" height="18" rx="9" fill="#4EC487"/>

    <!-- row 4 -->
    <rect x="48" y="556" width="1184" height="108" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="96" y="625" font-size="44" font-weight="800" fill="#1B8A82">40%</text>
    <text x="300" y="606" font-size="23" font-weight="700" fill="#383838">新產品線貢獻</text>
    <text x="300" y="636" font-size="15" fill="#8A9199">New product mix</text>
    <rect x="760" y="601" width="400" height="18" rx="9" fill="#E3F1E9"/>
    <rect x="760" y="601" width="160" height="18" rx="9" fill="#4EC487"/>
  </g>
</svg>
