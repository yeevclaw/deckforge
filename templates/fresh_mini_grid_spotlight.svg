<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <!-- card_variant: spotlight (mini_grid) — a KPI SET where one number dominates and the
       rest are breakdown/supporting metrics. One large lead card + stacked satellites.
       Distinct from stat_hero (a single number, no set) — use this when the headline number
       leads a group. Numbers teal, tabular-nums. -->
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC487"/><stop offset="100%" stop-color="#7BD8A6"/>
    </linearGradient>
    <radialGradient id="washLav" cx="92%" cy="4%" r="48%">
      <stop offset="0%" stop-color="#D9D4F0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D9D4F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="6%" cy="96%" r="52%">
      <stop offset="0%" stop-color="#BFE5CC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BFE5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2A4A3A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F4F4F4"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washGreen)"/>

  <!-- title -->
  <rect x="48" y="44" width="80" height="9" rx="4.5" fill="url(#pillGrad)"/>
  <text x="48" y="106" font-size="45" font-weight="800" fill="#383838">一個總量，三項拆解</text>

  <g style="font-variant-numeric: tabular-nums">
    <!-- lead KPI -->
    <rect x="48" y="180" width="540" height="460" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="318" y="268" font-size="16" font-weight="700" fill="#8A9199" text-anchor="middle" letter-spacing="2">2024 全年總營收</text>
    <text x="318" y="412" font-size="108" font-weight="800" fill="#1B8A82" text-anchor="middle">$24.8億</text>
    <rect x="278" y="446" width="80" height="5" rx="2.5" fill="#4EC487"/>
    <text x="318" y="506" font-size="20" fill="#4A5158" text-anchor="middle">同比 <tspan fill="#E8872E" font-weight="700">增長 31%</tspan>，創歷史新高</text>

    <!-- satellite 1 -->
    <rect x="612" y="180" width="620" height="140" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="660" y="263" font-size="40" font-weight="800" fill="#1B8A82">$13.1億</text>
    <text x="858" y="246" font-size="21" font-weight="700" fill="#383838">核心產品線</text>
    <text x="858" y="276" font-size="15" fill="#8A9199">53% of total · Core products</text>

    <!-- satellite 2 -->
    <rect x="612" y="340" width="620" height="140" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="660" y="423" font-size="40" font-weight="800" fill="#1B8A82">$7.4億</text>
    <text x="858" y="406" font-size="21" font-weight="700" fill="#383838">訂閱服務</text>
    <text x="858" y="436" font-size="15" fill="#8A9199">30% of total · Subscription</text>

    <!-- satellite 3 -->
    <rect x="612" y="500" width="620" height="140" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="660" y="583" font-size="40" font-weight="800" fill="#1B8A82">$4.3億</text>
    <text x="858" y="566" font-size="21" font-weight="700" fill="#383838">新興市場</text>
    <text x="858" y="596" font-size="15" fill="#8A9199">17% of total · Emerging</text>
  </g>
</svg>
