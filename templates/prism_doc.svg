<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     data-delivery-mode="reading"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <!-- Reading-mode (slidedoc) prose starter — IT_prism 版. The two_col_50_50 /
       single_focus workhorse for delivery_mode: "reading" decks. Demonstrates the
       three-layer read (assertion title → ink-bold lead-ins → ≤1 emphasis run per
       block), the 16px reading floor (no text below 16px anywhere — the root carries
       data-delivery-mode="reading" so check_svg enforces it), and the footer note
       strip carrying reading_notes (quiet voice: sources/caveats, never a conclusion).
       Full language: references/slidedoc.md. Lead-ins are ink #344252 bold WITHOUT the
       green device; the band emphasis marks the one fact to retain per block. -->
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- canvas + wash pair + corner bloom -->
  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress ticks -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- assertion title — slate, no pill bar, no underline -->
  <text x="48" y="90" font-size="34" font-weight="700" fill="#344252">平台遷移的兩個判斷：時機已到，風險可控</text>

  <!-- card A — one argument: claim heading + two lead-in blocks developing it -->
  <rect x="48" y="150" width="568" height="460" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="104" y="216" font-size="16" font-weight="700" fill="#6B7686" letter-spacing="2">判斷一 · 時機</text>
  <text x="104" y="256" font-size="26" font-weight="700" fill="#344252">自建維運成本已越過轉折點</text>
  <!-- block 1: ink-bold lead-in, then body; one green-band emphasis run -->
  <text x="104" y="314" font-size="19" font-weight="700" fill="#344252">成本曲線已經反轉。</text>
  <rect x="326" y="326" width="110" height="27" rx="4" fill="#DDF5E8"/>
  <text x="104" y="347" font-size="19" fill="#4C5A6B">
    <tspan x="104" dy="0">三年維運支出成長 2.1 倍，<tspan font-weight="700" fill="#344252">佔預算 38%</tspan>，</tspan>
    <tspan x="104" dy="35">同期系統可用率持平，投入不再轉化為品質。</tspan>
  </text>
  <!-- block 2 -->
  <text x="104" y="454" font-size="19" font-weight="700" fill="#344252">人力風險比帳面更大。</text>
  <text x="104" y="489" font-size="19" fill="#4C5A6B">
    <tspan x="104" dy="0">核心系統僅兩名工程師能維護，任一人離職</tspan>
    <tspan x="104" dy="35">即成單點；補齊同技能人力平均需 5 個月。</tspan>
  </text>

  <!-- card B -->
  <rect x="664" y="150" width="568" height="460" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
  <text x="720" y="216" font-size="16" font-weight="700" fill="#6B7686" letter-spacing="2">判斷二 · 風險</text>
  <text x="720" y="256" font-size="26" font-weight="700" fill="#344252">遷移風險有既定手段可壓低</text>
  <!-- block 1 -->
  <text x="720" y="314" font-size="19" font-weight="700" fill="#344252">灰度切換讓風險分期。</text>
  <rect x="714" y="361" width="165" height="27" rx="4" fill="#DDF5E8"/>
  <text x="720" y="347" font-size="19" fill="#4C5A6B">
    <tspan x="720" dy="0">先遷非核心負載，雙軌並行 8 週後才切主系統；</tspan>
    <tspan x="720" dy="35"><tspan font-weight="700" fill="#344252">每一步都有回退點</tspan>，不做不可逆的切換。</tspan>
  </text>
  <!-- block 2 -->
  <text x="720" y="454" font-size="19" font-weight="700" fill="#344252">合規已有前例可循。</text>
  <text x="720" y="489" font-size="19" fill="#4C5A6B">
    <tspan x="720" dy="0">同業兩家已完成同架構遷移並通過年度稽核；</tspan>
    <tspan x="720" dy="35">監理要求的條款均有現成控制項可對應。</tspan>
  </text>

  <!-- footer note strip — the quiet voice (reading_notes): sources / caveats, never a
       conclusion, never a title echo. Hairline + 16px on-canvas secondary (#4C5A6B —
       the wash-safe token; #6B7686 is white-card-only). -->
  <line x1="48" y1="648" x2="1232" y2="648" stroke="#DFE2E9" stroke-width="1"/>
  <text x="48" y="680" font-size="16" fill="#4C5A6B"><tspan font-weight="700" fill="#344252">註 · </tspan>成本數據為 2023–2025 財務結算口徑；同業案例取自公開稽核報告，全文見附錄 A。</text>
</svg>
