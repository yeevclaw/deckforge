<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <!-- card_variant: even_grid (mini_grid default) — IT_prism 版。3–5 parallel KPIs of
       comparable weight, each a number-first white panel card. Numbers are SLATE #344252
       (never green — green is a shape voice, not a text voice), weight 800, tabular-nums;
       the short accent rule under each number is the only green on the cards. -->
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- canvas + wash pair + corner bloom -->
  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress ticks (top-right page-position indicator) -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- assertion title — slate, no pill bar, no underline -->
  <text x="48" y="90" font-size="36" font-weight="700" fill="#344252">關鍵指標，一目了然</text>

  <!-- four equal KPI cards -->
  <g style="font-variant-numeric: tabular-nums">
    <rect x="48"  y="208" width="278" height="384" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
    <text x="187" y="368" font-size="62" font-weight="800" fill="#344252" text-anchor="middle">47.2%</text>
    <rect x="157" y="392" width="60" height="4" rx="2" fill="#58D494"/>
    <text x="187" y="446" font-size="20" font-weight="700" fill="#344252" text-anchor="middle">營收同比增長</text>
    <text x="187" y="476" font-size="13" fill="#6B7686" text-anchor="middle" letter-spacing="1">YoY Revenue Growth</text>

    <rect x="350" y="208" width="278" height="384" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
    <text x="489" y="368" font-size="62" font-weight="800" fill="#344252" text-anchor="middle">15M</text>
    <rect x="459" y="392" width="60" height="4" rx="2" fill="#58D494"/>
    <text x="489" y="446" font-size="20" font-weight="700" fill="#344252" text-anchor="middle">月活躍用戶</text>
    <text x="489" y="476" font-size="13" fill="#6B7686" text-anchor="middle" letter-spacing="1">Monthly Active Users</text>

    <rect x="652" y="208" width="278" height="384" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
    <text x="791" y="368" font-size="62" font-weight="800" fill="#344252" text-anchor="middle">3.2億</text>
    <rect x="761" y="392" width="60" height="4" rx="2" fill="#58D494"/>
    <text x="791" y="446" font-size="20" font-weight="700" fill="#344252" text-anchor="middle">年度淨利潤</text>
    <text x="791" y="476" font-size="13" fill="#6B7686" text-anchor="middle" letter-spacing="1">Annual Net Profit</text>

    <rect x="954" y="208" width="278" height="384" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
    <text x="1093" y="368" font-size="62" font-weight="800" fill="#344252" text-anchor="middle">#1</text>
    <rect x="1063" y="392" width="60" height="4" rx="2" fill="#58D494"/>
    <text x="1093" y="446" font-size="20" font-weight="700" fill="#344252" text-anchor="middle">細分市場排名</text>
    <text x="1093" y="476" font-size="13" fill="#6B7686" text-anchor="middle" letter-spacing="1">Category Rank</text>
  </g>
</svg>
