<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Helvetica, 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', 'Noto Sans CJK TC', 'Noto Sans TC', sans-serif">
  <!-- card_variant: ribbon_row (mini_grid) — IT_prism 版。3–5 KPIs whose RELATIVE magnitudes
       matter, or that need a longer caption than an even tile allows. Full-width rows:
       number left, label + caption middle, a proportion bar right so the eye compares
       magnitudes down the column. Numbers SLATE #344252 (never green), tabular-nums;
       the bar is green #58D494 on the #E4E8EF track. -->
  <defs>
    <radialGradient id="washLav" cx="8%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#EEEEFD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EEEEFD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washMint" cx="92%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#E7F9F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E7F9F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomTR" cx="78%" cy="4%" r="34%">
      <stop offset="0%" stop-color="#7CDDAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7CDDAB" stop-opacity="0"/>
    </radialGradient>
    <filter id="prismShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- canvas + wash pair + corner bloom -->
  <rect width="1280" height="720" fill="#EFF0F3"/>
  <rect width="1280" height="720" fill="url(#washLav)"/>
  <rect width="1280" height="720" fill="url(#washMint)"/>
  <rect width="1280" height="720" fill="url(#bloomTR)"/>
  <rect x="960" y="-80" width="220" height="220" fill="none" stroke="#FFFFFF"
        stroke-opacity="0.5" stroke-dasharray="5 5" transform="rotate(12 1070 30)"/>

  <!-- progress ticks (top-right page-position indicator) -->
  <g>
    <rect x="1022" y="46" width="64" height="10" rx="2" fill="#58D494"/>
    <rect x="1096" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
    <rect x="1170" y="46" width="64" height="10" rx="2" fill="#DDE1E8"/>
  </g>

  <!-- assertion title — slate, no pill bar, no underline -->
  <text x="48" y="90" font-size="36" font-weight="700" fill="#344252">四大區隔，量級一眼分明</text>

  <g style="font-variant-numeric: tabular-nums">
    <!-- row 1 -->
    <rect x="48" y="178" width="1184" height="108" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
    <text x="96" y="247" font-size="44" font-weight="800" fill="#344252">92%</text>
    <text x="300" y="228" font-size="23" font-weight="700" fill="#344252">企業客戶續約率</text>
    <text x="300" y="258" font-size="15" fill="#6B7686">Enterprise renewal</text>
    <rect x="760" y="223" width="400" height="18" rx="9" fill="#E4E8EF"/>
    <rect x="760" y="223" width="368" height="18" rx="9" fill="#58D494"/>

    <!-- row 2 -->
    <rect x="48" y="304" width="1184" height="108" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
    <text x="96" y="373" font-size="44" font-weight="800" fill="#344252">74%</text>
    <text x="300" y="354" font-size="23" font-weight="700" fill="#344252">中小企業滲透率</text>
    <text x="300" y="384" font-size="15" fill="#6B7686">SMB penetration</text>
    <rect x="760" y="349" width="400" height="18" rx="9" fill="#E4E8EF"/>
    <rect x="760" y="349" width="296" height="18" rx="9" fill="#58D494"/>

    <!-- row 3 -->
    <rect x="48" y="430" width="1184" height="108" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
    <text x="96" y="499" font-size="44" font-weight="800" fill="#344252">58%</text>
    <text x="300" y="480" font-size="23" font-weight="700" fill="#344252">海外營收占比</text>
    <text x="300" y="510" font-size="15" fill="#6B7686">Overseas revenue</text>
    <rect x="760" y="475" width="400" height="18" rx="9" fill="#E4E8EF"/>
    <rect x="760" y="475" width="232" height="18" rx="9" fill="#58D494"/>

    <!-- row 4 -->
    <rect x="48" y="556" width="1184" height="108" rx="14" fill="#FFFFFF" filter="url(#prismShadow)"/>
    <text x="96" y="625" font-size="44" font-weight="800" fill="#344252">40%</text>
    <text x="300" y="606" font-size="23" font-weight="700" fill="#344252">新產品線貢獻</text>
    <text x="300" y="636" font-size="15" fill="#6B7686">New product mix</text>
    <rect x="760" y="601" width="400" height="18" rx="9" fill="#E4E8EF"/>
    <rect x="760" y="601" width="160" height="18" rx="9" fill="#58D494"/>
  </g>
</svg>
